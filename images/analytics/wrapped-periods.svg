<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wrapped period diagram showing Weekly, Monthly, and Yearly coverage windows">
  <rect width="760" height="280" fill="#F8F5F2"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="15" font-weight="600">What each Wrapped tab covers</text>

  <!-- Today marker (right side) -->
  <line x1="680" y1="50" x2="680" y2="248" stroke="#6B6770" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="680" y="46" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="12">Today</text>

  <!-- ── Weekly row ── -->
  <text x="30" y="95" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Weekly</text>
  <rect x="560" y="77" width="90" height="30" rx="6" fill="#8E4A63"/>
  <text x="605" y="97" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Last week</text>
  <line x1="650" y1="92" x2="680" y2="92" stroke="#6B6770" stroke-width="1.5"/>
  <text x="605" y="122" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">Sun – Sat (7 days)</text>

  <!-- ── Monthly row ── -->
  <text x="30" y="166" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Monthly</text>
  <rect x="320" y="148" width="330" height="30" rx="6" fill="#8E4A63"/>
  <text x="485" y="168" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Last calendar month</text>
  <line x1="650" y1="163" x2="680" y2="163" stroke="#6B6770" stroke-width="1.5"/>
  <text x="485" y="193" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">1st – last day of previous month</text>

  <!-- ── Yearly row ── -->
  <text x="30" y="237" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Yearly</text>
  <rect x="80" y="219" width="570" height="30" rx="6" fill="#F0D793"/>
  <text x="365" y="239" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Previous full year (Jan 1 – Dec 31)</text>
  <line x1="650" y1="234" x2="680" y2="234" stroke="#6B6770" stroke-width="1.5"/>

  <!-- Legend note -->
  <text x="380" y="268" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">Each tab always shows completed periods, never a partial current week, month, or year.</text>
</svg>