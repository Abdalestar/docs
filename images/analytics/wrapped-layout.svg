<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wrapped page layout diagram">
  <!-- Background -->
  <rect width="800" height="420" fill="#F8F5F2" rx="8"/>

  <!-- Title bar -->
  <rect x="30" y="20" width="740" height="60" rx="8" fill="#8E4A63"/>
  <text x="60" y="55" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Your Wrapped</text>
  <text x="60" y="70" fill="#F0D793" font-family="system-ui, -apple-system, sans-serif" font-size="11">Spotify-style summary of your loyalty program</text>

  <!-- Period tabs -->
  <rect x="30" y="95" width="90" height="32" rx="6" fill="#8E4A63"/>
  <text x="75" y="116" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Weekly</text>

  <rect x="130" y="95" width="90" height="32" rx="6" fill="white" stroke="#423F4C" stroke-width="1"/>
  <text x="175" y="116" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12">Monthly</text>

  <rect x="230" y="95" width="90" height="32" rx="6" fill="white" stroke="#423F4C" stroke-width="1"/>
  <text x="275" y="116" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12">Yearly</text>

  <!-- Your Numbers card -->
  <rect x="30" y="145" width="740" height="150" rx="10" fill="white" stroke="#E8E0DC" stroke-width="1"/>
  <text x="50" y="172" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Your Numbers</text>

  <!-- Metrics grid (2 cols x 3 rows) -->
  <rect x="50" y="185" width="340" height="30" rx="5" fill="#F8F5F2"/>
  <text x="60" y="202" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Total Stamps</text>
  <text x="300" y="205" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">142</text>

  <rect x="410" y="185" width="340" height="30" rx="5" fill="#F8F5F2"/>
  <text x="420" y="202" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Points Earned</text>
  <text x="660" y="205" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">3,450</text>

  <rect x="50" y="222" width="340" height="30" rx="5" fill="#F8F5F2"/>
  <text x="60" y="239" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Redemptions</text>
  <text x="300" y="242" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">18</text>

  <rect x="410" y="222" width="340" height="30" rx="5" fill="#F8F5F2"/>
  <text x="420" y="239" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">New Members</text>
  <text x="660" y="242" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">12</text>

  <rect x="50" y="259" width="340" height="30" rx="5" fill="#F8F5F2"/>
  <text x="60" y="276" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Est. Revenue</text>
  <text x="300" y="279" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">$890</text>

  <rect x="410" y="259" width="340" height="30" rx="5" fill="#F8F5F2"/>
  <text x="420" y="276" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Growth</text>
  <text x="660" y="279" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" text-anchor="end">8%</text>

  <!-- Highlights card -->
  <rect x="30" y="310" width="355" height="95" rx="10" fill="white" stroke="#E8E0DC" stroke-width="1"/>
  <text x="50" y="337" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Highlights</text>
  <circle cx="55" cy="355" r="3" fill="#8E4A63"/>
  <text x="65" y="359" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">142 stamps issued</text>
  <circle cx="55" cy="375" r="3" fill="#8E4A63"/>
  <text x="65" y="379" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">12 new members joined</text>
  <circle cx="55" cy="395" r="3" fill="#8E4A63"/>
  <text x="65" y="399" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">Tuesday was your busiest day</text>

  <!-- Top Customer card -->
  <rect x="415" y="310" width="170" height="95" rx="10" fill="white" stroke="#E8E0DC" stroke-width="1"/>
  <text x="435" y="337" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Top Customer</text>
  <text x="435" y="365" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">Ahmed K.</text>
  <text x="435" y="385" fill="#F0D793" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">24 visits</text>

  <!-- Busiest Day card -->
  <rect x="600" y="310" width="170" height="95" rx="10" fill="white" stroke="#E8E0DC" stroke-width="1"/>
  <text x="620" y="337" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Busiest Day</text>
  <text x="620" y="365" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">Tuesday</text>
  <text x="620" y="385" fill="#F0D793" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700">38 activities</text>
</svg>
