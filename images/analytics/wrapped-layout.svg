<svg viewBox="0 0 640 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Analytics Wrapped page layout showing four stacked cards">
  <rect width="640" height="540" fill="#F8F5F2" rx="12"/>

  <!-- Page header -->
  <rect x="24" y="20" width="592" height="56" rx="8" fill="#8E4A63"/>
  <circle cx="50" cy="48" r="12" fill="#F0D793"/>
  <text x="66" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="white">Your Wrapped</text>
  <text x="66" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Spotify-style summary of your loyalty program</text>
  <rect x="510" y="34" width="94" height="22" rx="11" fill="rgba(255,255,255,0.15)"/>
  <text x="557" y="49" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Auto-generated</text>

  <!-- Tab bar -->
  <rect x="24" y="88" width="592" height="36" rx="8" fill="#423F4C" fill-opacity="0.08"/>
  <rect x="28" y="92" width="120" height="28" rx="6" fill="#8E4A63"/>
  <text x="88" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white">Weekly</text>
  <text x="220" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6770">Monthly</text>
  <text x="350" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6770">Yearly</text>

  <!-- Period label + Share button -->
  <text x="24" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#423F4C">Week of Jan 6</text>
  <text x="24" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">Jan 6 - Jan 12, 2025</text>
  <rect x="554" y="140" width="62" height="28" rx="6" fill="white" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="585" y="159" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#8E4A63">Share</text>

  <!-- Card 1: Your Numbers -->
  <rect x="24" y="182" width="592" height="120" rx="8" fill="url(#grad1)"/>
  <text x="40" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#423F4C">Your Numbers</text>
  <text x="40" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B6770">Here's how your business performed</text>
  <rect x="36" y="226" width="84" height="60" rx="6" fill="white" fill-opacity="0.6"/>
  <text x="44" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B6770">Total Stamps</text>
  <text x="44" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#423F4C">248</text>
  <rect x="128" y="226" width="84" height="60" rx="6" fill="white" fill-opacity="0.6"/>
  <text x="136" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B6770">Points Earned</text>
  <text x="136" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#423F4C">1,840</text>
  <rect x="220" y="226" width="84" height="60" rx="6" fill="white" fill-opacity="0.6"/>
  <text x="228" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B6770">Redemptions</text>
  <text x="228" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#423F4C">32</text>
  <rect x="312" y="226" width="84" height="60" rx="6" fill="white" fill-opacity="0.6"/>
  <text x="320" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B6770">New Members</text>
  <text x="320" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#423F4C">14</text>
  <rect x="404" y="226" width="84" height="60" rx="6" fill="white" fill-opacity="0.6"/>
  <text x="412" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B6770">Est. Revenue</text>
  <text x="412" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#423F4C">$186</text>
  <rect x="496" y="226" width="84" height="60" rx="6" fill="white" fill-opacity="0.6"/>
  <text x="504" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B6770">Growth</text>
  <text x="504" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#8E4A63">+9%</text>

  <!-- Card 2: Highlights -->
  <rect x="24" y="314" width="592" height="80" rx="8" fill="url(#grad2)"/>
  <text x="40" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#423F4C">Highlights</text>
  <circle cx="44" cy="354" r="3" fill="#8E4A63"/>
  <text x="54" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#423F4C">248 stamps issued</text>
  <circle cx="44" cy="374" r="3" fill="#8E4A63"/>
  <text x="54" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#423F4C">Fatima Al-Sayed was your most active customer</text>

  <!-- Card 3: Top Customer -->
  <rect x="24" y="406" width="290" height="60" rx="8" fill="url(#grad3)"/>
  <text x="40" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#423F4C">Top Customer</text>
  <text x="40" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">Fatima Al-Sayed visited 18 times</text>

  <!-- Card 4: Busiest Day -->
  <rect x="326" y="406" width="290" height="60" rx="8" fill="url(#grad4)"/>
  <text x="342" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#423F4C">Busiest Day</text>
  <text x="342" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">Saturday with 68 activities</text>

  <!-- Legend at bottom -->
  <rect x="24" y="482" width="592" height="42" rx="6" fill="#F0D793" fill-opacity="0.3"/>
  <text x="320" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B6770">Top Customer and Busiest Day only appear when data exists for the period</text>
  <text x="320" y="516" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6B6770">All four cards update when you switch between Weekly, Monthly, and Yearly</text>

  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E4A63" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F0D793" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D793" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8E4A63" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D793" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F0D793" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#423F4C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8E4A63" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
</svg>
