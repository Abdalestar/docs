<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Redemption flow diagram showing two paths: entering a code and looking up a customer">
  <rect width="860" height="420" fill="#F8F5F2"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="15" font-weight="700">Two ways to process a redemption</text>

  <!-- Path labels -->
  <text x="215" y="68" text-anchor="middle" fill="#8E4A63"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="700" letter-spacing="0.5">ENTER CODE</text>
  <text x="645" y="68" text-anchor="middle" fill="#8E4A63"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="700" letter-spacing="0.5">LOOK UP CUSTOMER</text>

  <!-- Divider line -->
  <line x1="430" y1="54" x2="430" y2="390" stroke="#6B6770" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Step 1 left: Customer shows code -->
  <rect x="80" y="82" width="270" height="54" rx="10" fill="#8E4A63"/>
  <text x="215" y="105" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Customer shows code on phone</text>
  <text x="215" y="123" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">e.g. ABC123</text>

  <line x1="215" y1="136" x2="215" y2="162" stroke="#423F4C" stroke-width="2"/>
  <polygon points="210,158 215,168 220,158" fill="#423F4C"/>

  <!-- Step 2 left: Type and look up -->
  <rect x="80" y="170" width="270" height="54" rx="10" fill="white" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="215" y="193" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Type code, click Look Up</text>
  <text x="215" y="211" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Reward details appear below</text>

  <line x1="215" y1="224" x2="215" y2="250" stroke="#423F4C" stroke-width="2"/>
  <polygon points="210,246 215,256 220,246" fill="#423F4C"/>

  <!-- Step 3 left: Review and confirm -->
  <rect x="80" y="258" width="270" height="54" rx="10" fill="white" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="215" y="281" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Review reward, click Confirm</text>
  <text x="215" y="299" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Only works if status is available</text>

  <line x1="215" y1="312" x2="215" y2="338" stroke="#423F4C" stroke-width="2"/>
  <polygon points="210,334 215,344 220,334" fill="#423F4C"/>

  <!-- Step 4 left: Done -->
  <rect x="120" y="346" width="190" height="44" rx="10" fill="#F0D793"/>
  <text x="215" y="373" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="700">Redeemed</text>

  <!-- Step 1 right: Search -->
  <rect x="510" y="82" width="270" height="54" rx="10" fill="#8E4A63"/>
  <text x="645" y="105" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Search by name, email,</text>
  <text x="645" y="123" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">phone, or Qtap ID (2+ chars)</text>

  <line x1="645" y1="136" x2="645" y2="162" stroke="#423F4C" stroke-width="2"/>
  <polygon points="640,158 645,168 650,158" fill="#423F4C"/>

  <!-- Step 2 right: Select member -->
  <rect x="510" y="170" width="270" height="54" rx="10" fill="white" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="645" y="193" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Select customer from list</text>
  <text x="645" y="211" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Pending rewards load automatically</text>

  <line x1="645" y1="224" x2="645" y2="250" stroke="#423F4C" stroke-width="2"/>
  <polygon points="640,246 645,256 650,246" fill="#423F4C"/>

  <!-- Step 3 right: Choose reward and confirm -->
  <rect x="510" y="258" width="270" height="54" rx="10" fill="white" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="645" y="281" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Click Redeem, then Confirm</text>
  <text x="645" y="299" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Points orgs see points cost too</text>

  <line x1="645" y1="312" x2="645" y2="338" stroke="#423F4C" stroke-width="2"/>
  <polygon points="640,334 645,344 650,334" fill="#423F4C"/>

  <!-- Step 4 right: Done -->
  <rect x="550" y="346" width="190" height="44" rx="10" fill="#F0D793"/>
  <text x="645" y="373" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="700">Redeemed</text>

</svg>
