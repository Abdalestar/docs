<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Page background -->
  <rect width="1200" height="520" fill="#f8f8f9"/>

  <!-- Main content card -->
  <rect x="24" y="24" width="1152" height="472" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Page header -->
  <text x="48" y="68" font-size="22" font-weight="700" fill="#1f2937">Staff</text>
  <text x="48" y="92" font-size="14" fill="#6b7280">Manage your team members and their permissions</text>

  <!-- Action buttons -->
  <rect x="960" y="44" width="110" height="36" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="1015" y="66" font-size="13" fill="#374151" text-anchor="middle">Activity Log</text>

  <rect x="1080" y="44" width="96" height="36" rx="8" fill="#8E4A63"/>
  <text x="1128" y="66" font-size="13" fill="white" text-anchor="middle">Invite Staff</text>

  <!-- Divider -->
  <line x1="48" y1="110" x2="1152" y2="110" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Table header -->
  <rect x="24" y="110" width="1152" height="44" fill="#f9fafb" rx="0"/>
  <text x="64" y="137" font-size="12" font-weight="600" fill="#6b7280" text-anchor="start">TEAM MEMBER</text>
  <text x="620" y="137" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">ROLE</text>
  <text x="820" y="137" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">STATUS</text>
  <text x="1020" y="137" font-size="12" font-weight="600" fill="#6b7280" text-anchor="middle">JOINED</text>

  <line x1="24" y1="154" x2="1176" y2="154" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 1: Pending invite -->
  <rect x="24" y="154" width="1152" height="68" fill="white"/>

  <!-- Avatar circle for pending -->
  <circle cx="64" cy="188" r="20" fill="#f3f4f6"/>
  <text x="64" y="194" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle">G</text>

  <text x="96" y="183" font-size="14" font-weight="500" fill="#374151">Pending invite</text>
  <text x="96" y="201" font-size="13" fill="#9ca3af">gocekeh608@onbap.com</text>

  <!-- Role badge: pending -->
  <rect x="570" y="174" width="100" height="28" rx="6" fill="#f3f4f6"/>
  <text x="620" y="192" font-size="13" fill="#6b7280" text-anchor="middle">–</text>

  <!-- Status badge: pending -->
  <rect x="769" y="174" width="102" height="28" rx="6" fill="#fef3c7"/>
  <text x="820" y="192" font-size="13" fill="#92400e" text-anchor="middle">Pending</text>

  <text x="1020" y="192" font-size="13" fill="#9ca3af" text-anchor="middle">–</text>

  <!-- Three-dot menu -->
  <circle cx="1140" cy="188" r="3" fill="#9ca3af"/>
  <circle cx="1150" cy="188" r="3" fill="#9ca3af"/>
  <circle cx="1160" cy="188" r="3" fill="#9ca3af"/>

  <line x1="24" y1="222" x2="1176" y2="222" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row 2: Owner -->
  <rect x="24" y="222" width="1152" height="68" fill="white"/>

  <!-- Avatar circle for owner -->
  <circle cx="64" cy="256" r="20" fill="#8E4A63"/>
  <text x="64" y="262" font-size="13" font-weight="600" fill="white" text-anchor="middle">G</text>

  <text x="96" y="251" font-size="14" font-weight="500" fill="#374151">gocekeh608@onbap.com</text>
  <text x="96" y="269" font-size="13" fill="#9ca3af">gocekeh608@onbap.com</text>

  <!-- Role badge: owner -->
  <rect x="556" y="242" width="128" height="28" rx="6" fill="#f3f0ff"/>
  <text x="620" y="260" font-size="13" fill="#7c3aed" text-anchor="middle">Owner</text>

  <!-- Status badge: active -->
  <rect x="770" y="242" width="100" height="28" rx="6" fill="#d1fae5"/>
  <text x="820" y="260" font-size="13" fill="#065f46" text-anchor="middle">Active</text>

  <text x="1020" y="260" font-size="13" fill="#6b7280" text-anchor="middle">Mar 18, 2026</text>

  <!-- Three-dot menu -->
  <circle cx="1140" cy="256" r="3" fill="#9ca3af"/>
  <circle cx="1150" cy="256" r="3" fill="#9ca3af"/>
  <circle cx="1160" cy="256" r="3" fill="#9ca3af"/>

  <line x1="24" y1="290" x2="1176" y2="290" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Empty state hint -->
  <text x="600" y="360" font-size="13" fill="#d1d5db" text-anchor="middle">Invite team members to give them access to the dashboard.</text>

</svg>
