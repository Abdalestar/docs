<svg width="600" height="310" viewBox="0 0 600 310" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#423F4C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="310" fill="#FAFAF9" rx="10"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#423F4C">API Authentication Paths</text>

  <!-- ────── Left panel: Public ────── -->
  <!-- Card background -->
  <rect x="22" y="50" width="262" height="240" rx="10" fill="white" stroke="#F0D793" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="22" y="50" width="262" height="38" rx="10" fill="#F0D793"/>
  <rect x="22" y="74" width="262" height="14" fill="#F0D793"/>
  <text x="153" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Public Endpoints</text>

  <!-- Endpoint list -->
  <text x="153" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#8E4A63">POST /api/scan</text>
  <text x="153" y="128" text-anchor="middle" font-family="monospace" font-size="10.5" fill="#8E4A63">GET /api/qr-codes/[code]/details</text>
  <text x="153" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#8E4A63">GET /api/campaigns/rewards/</text>
  <text x="153" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#8E4A63">validate/[code]</text>

  <!-- Arrow down -->
  <line x1="153" y1="172" x2="153" y2="202" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="63" y="205" width="180" height="46" rx="7" fill="#8E4A63"/>
  <text x="153" y="225" text-anchor="middle" font-size="12" font-weight="600" fill="white">No auth required</text>
  <text x="153" y="242" text-anchor="middle" font-size="11" fill="#F0D793">Request proceeds directly</text>

  <!-- ────── Right panel: Protected ────── -->
  <!-- Card background -->
  <rect x="316" y="50" width="262" height="240" rx="10" fill="white" stroke="#8E4A63" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="316" y="50" width="262" height="38" rx="10" fill="#8E4A63"/>
  <rect x="316" y="74" width="262" height="14" fill="#8E4A63"/>
  <text x="447" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="white">Protected Endpoints</text>

  <!-- Description -->
  <text x="447" y="108" text-anchor="middle" font-size="12" fill="#423F4C">All other endpoints</text>
  <text x="447" y="126" text-anchor="middle" font-size="11" fill="#423F4C">Requires Supabase session cookie</text>
  <text x="447" y="144" text-anchor="middle" font-family="monospace" font-size="10" fill="#8E4A63">sb-access-token: &lt;token&gt;</text>

  <!-- Arrow to Supabase check -->
  <line x1="447" y1="155" x2="447" y2="182" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Supabase validates box -->
  <rect x="347" y="185" width="200" height="36" rx="7" fill="#423F4C"/>
  <text x="447" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="white">Supabase validates token</text>
  <text x="447" y="217" text-anchor="middle" font-size="10.5" fill="#F0D793">via middleware on every request</text>

  <!-- Arrow to result -->
  <line x1="447" y1="221" x2="447" y2="248" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="357" y="251" width="180" height="26" rx="6" fill="#8E4A63"/>
  <text x="447" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="white">200 OK  or  401 Unauthorized</text>

  <!-- Footer note -->
  <text x="300" y="300" text-anchor="middle" font-size="10" fill="#888">Qtap API · dashboard.qtap.qa</text>
</svg>
