<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Merchants page state diagram: empty state transitions to active profile card via Create Merchant, which then has Preview, Edit, and Delete actions">
  <rect width="860" height="320" fill="#F8F5F2"/>

  <!-- Empty state box -->
  <rect x="30" y="80" width="190" height="160" rx="12" fill="#423F4C"/>
  <text x="125" y="118" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="700">Empty state</text>
  <rect x="55" y="130" width="140" height="50" rx="8" fill="#6B6770"/>
  <text x="125" y="150" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">No merchant yet</text>
  <text x="125" y="168" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10">Create Merchant button</text>
  <text x="125" y="212" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">First visit or after delete</text>

  <!-- Arrow: empty to active -->
  <line x1="225" y1="160" x2="305" y2="160" stroke="#8E4A63" stroke-width="2.5"/>
  <polygon points="305,154 318,160 305,166" fill="#8E4A63"/>
  <text x="271" y="148" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Create</text>

  <!-- Active profile card box -->
  <rect x="322" y="60" width="210" height="200" rx="12" fill="#8E4A63"/>
  <text x="427" y="96" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="700">Active profile card</text>
  <rect x="342" y="108" width="170" height="108" rx="8" fill="#723A50"/>
  <text x="427" y="128" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Logo + name + Active badge</text>
  <text x="427" y="146" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10">Description, category, location</text>
  <text x="427" y="162" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10">phone, website, rating</text>
  <line x1="342" y1="174" x2="512" y2="174" stroke="#F8F5F2" stroke-width="0.5" opacity="0.4"/>
  <text x="427" y="192" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10">Members · Stamps · Points · Redeemed</text>
  <text x="427" y="209" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="10">(live stats)</text>
  <text x="427" y="244" text-anchor="middle" fill="#F8F5F2"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Preview · Edit · Delete</text>

  <!-- Arrow: active to Preview -->
  <line x1="535" y1="130" x2="620" y2="100" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="617,94 628,100 619,108" fill="#6B6770"/>
  <!-- Arrow: active to Edit -->
  <line x1="535" y1="160" x2="620" y2="160" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="617,154 628,160 617,166" fill="#6B6770"/>
  <!-- Arrow: active to Delete -->
  <line x1="535" y1="190" x2="620" y2="220" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="617,214 628,222 619,228" fill="#6B6770"/>

  <!-- Preview action box -->
  <rect x="630" y="68" width="200" height="60" rx="10" fill="#F8F5F2" stroke="#6B6770" stroke-width="1.5"/>
  <text x="730" y="93" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">Preview</text>
  <text x="730" y="113" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Opens qtap.qa/m/[slug]</text>

  <!-- Edit action box -->
  <rect x="630" y="138" width="200" height="60" rx="10" fill="#F8F5F2" stroke="#6B6770" stroke-width="1.5"/>
  <text x="730" y="163" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">Edit</text>
  <text x="730" y="183" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Opens profile form</text>

  <!-- Delete action box -->
  <rect x="630" y="208" width="200" height="60" rx="10" fill="#F8F5F2" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="730" y="233" text-anchor="middle" fill="#8E4A63"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">Delete</text>
  <text x="730" y="253" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Confirm, then clears profile</text>
</svg>
