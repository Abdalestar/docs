<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Condition group AND/OR logic diagram">
  <rect width="820" height="340" fill="#F8F5F2" rx="8"/>
  
  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="15" font-weight="700">How AND / OR logic works within a condition group</text>

  <!-- LEFT: AND example -->
  <rect x="40" y="55" width="340" height="260" rx="12" fill="white" stroke="#8E4A63" stroke-width="2"/>
  <text x="210" y="82" text-anchor="middle" fill="#8E4A63"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="700">Match ALL of the following rules</text>

  <!-- Rule 1 box -->
  <rect x="68" y="100" width="284" height="48" rx="8" fill="#F8F5F2" stroke="#8E4A63" stroke-width="1"/>
  <text x="210" y="120" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13">Total Stamps  greater than  5</text>
  <text x="210" y="138" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">Rule 1</text>

  <!-- AND connector -->
  <line x1="210" y1="148" x2="210" y2="168" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="188" y="168" width="44" height="22" rx="11" fill="#423F4C"/>
  <text x="210" y="183" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">AND</text>
  <line x1="210" y1="190" x2="210" y2="210" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Rule 2 box -->
  <rect x="68" y="210" width="284" height="48" rx="8" fill="#F8F5F2" stroke="#8E4A63" stroke-width="1"/>
  <text x="210" y="230" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13">Days Since Last Visit  less than  30</text>
  <text x="210" y="248" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">Rule 2</text>

  <!-- Result -->
  <rect x="68" y="278" width="284" height="26" rx="8" fill="#8E4A63"/>
  <text x="210" y="295" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Member must pass BOTH rules</text>

  <!-- RIGHT: OR example -->
  <rect x="440" y="55" width="340" height="260" rx="12" fill="white" stroke="#F0D793" stroke-width="2"/>
  <text x="610" y="82" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="700">Match ANY of the following rules</text>

  <!-- Rule 1 box -->
  <rect x="468" y="100" width="284" height="48" rx="8" fill="#F8F5F2" stroke="#F0D793" stroke-width="1.5"/>
  <text x="610" y="120" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13">Tags  contains  vip</text>
  <text x="610" y="138" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">Rule 1</text>

  <!-- OR connector -->
  <line x1="610" y1="148" x2="610" y2="168" stroke="#6B6770" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="591" y="168" width="38" height="22" rx="11" fill="#6B6770"/>
  <text x="610" y="183" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">OR</text>
  <line x1="610" y1="190" x2="610" y2="210" stroke="#6B6770" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Rule 2 box -->
  <rect x="468" y="210" width="284" height="48" rx="8" fill="#F8F5F2" stroke="#F0D793" stroke-width="1.5"/>
  <text x="610" y="230" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif" font-size="13">Total Points  greater than  500</text>
  <text x="610" y="248" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif" font-size="11">Rule 2</text>

  <!-- Result -->
  <rect x="468" y="278" width="284" height="26" rx="8" fill="#423F4C"/>
  <text x="610" y="295" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Member must pass EITHER rule</text>
</svg>
