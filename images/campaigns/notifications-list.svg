<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" font-family="Inter, Segoe UI, sans-serif">
  <rect width="760" height="340" fill="#F9F9FB" rx="12"/>

  <!-- Page header -->
  <text x="32" y="44" font-size="20" font-weight="700" fill="#423F4C">Push Notifications</text>
  <text x="32" y="64" font-size="13" fill="#7A7585">Send messages directly to your customers</text>

  <!-- New Notification button -->
  <rect x="620" y="26" width="120" height="32" rx="8" fill="#8E4A63"/>
  <text x="680" y="47" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">+ New Notification</text>

  <!-- Tab bar -->
  <rect x="32" y="82" width="696" height="38" rx="8" fill="#F0EBF0"/>
  <!-- Active tab: All -->
  <rect x="36" y="86" width="60" height="30" rx="6" fill="#FFFFFF"/>
  <text x="66" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#8E4A63">All</text>
  <!-- Inactive tabs -->
  <text x="146" y="106" text-anchor="middle" font-size="13" fill="#7A7585">Drafts (0)</text>
  <text x="260" y="106" text-anchor="middle" font-size="13" fill="#7A7585">Scheduled (2)</text>
  <text x="364" y="106" text-anchor="middle" font-size="13" fill="#7A7585">Sent (2)</text>
  <text x="450" y="106" text-anchor="middle" font-size="13" fill="#7A7585">Templates</text>

  <!-- Card 1: Sent -->
  <rect x="32" y="134" width="696" height="72" rx="10" fill="#FFFFFF" stroke="#E8E4EE" stroke-width="1.5"/>
  <text x="56" y="162" font-size="15" font-weight="700" fill="#423F4C">Birthday Special!</text>
  <!-- Sent badge -->
  <rect x="188" y="148" width="52" height="22" rx="11" fill="#E6F4EF"/>
  <text x="214" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#2E8B57">✓ Sent</text>
  <text x="56" y="182" font-size="13" fill="#7A7585">Visit us on your birthday for bonus stamps!</text>
  <!-- Stats -->
  <text x="56" y="200" font-size="12" fill="#9A94A8">Sent: 20</text>
  <text x="130" y="200" font-size="12" fill="#9A94A8">Opened: 60%</text>
  <text x="228" y="200" font-size="12" fill="#9A94A8">Clicked: 25%</text>
  <text x="656" y="200" font-size="12" fill="#B0AABB">Mar 14, 2026</text>

  <!-- Card 2: Scheduled -->
  <rect x="32" y="218" width="696" height="72" rx="10" fill="#FFFFFF" stroke="#E8E4EE" stroke-width="1.5"/>
  <text x="56" y="246" font-size="15" font-weight="700" fill="#423F4C">Weekend Vibes</text>
  <!-- Scheduled badge -->
  <rect x="194" y="232" width="84" height="22" rx="11" fill="#EEF3FF"/>
  <text x="236" y="247" text-anchor="middle" font-size="11" font-weight="600" fill="#4A6FDB">⏱ Scheduled</text>
  <text x="56" y="266" font-size="13" fill="#7A7585">Double stamp hours this Saturday 2-5 PM!</text>
  <text x="56" y="284" font-size="12" fill="#9A94A8">Scheduled for: Apr 15, 2026, 2:34 PM</text>
  <text x="656" y="284" font-size="12" fill="#B0AABB">Apr 12, 2026</text>

  <!-- Anatomy callouts -->
  <!-- Title label -->
  <line x1="56" y1="155" x2="32" y2="320" stroke="#8E4A63" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="28" y="330" text-anchor="middle" font-size="10" fill="#8E4A63">Title</text>

  <!-- Badge label -->
  <line x1="214" y1="170" x2="214" y2="320" stroke="#8E4A63" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="214" y="330" text-anchor="middle" font-size="10" fill="#8E4A63">Status</text>

  <!-- Stats label -->
  <line x1="185" y1="200" x2="390" y2="320" stroke="#8E4A63" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="390" y="330" text-anchor="middle" font-size="10" fill="#8E4A63">Sent / Opened% / Clicked%</text>

  <!-- Date label -->
  <line x1="700" y1="200" x2="700" y2="320" stroke="#8E4A63" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="700" y="330" text-anchor="middle" font-size="10" fill="#8E4A63">Date</text>
</svg>
