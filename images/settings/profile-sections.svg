<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Business profile settings page sections and save actions">
  <rect width="820" height="480" fill="#F8F5F2"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="15" font-weight="700">Business Profile — Settings page structure</text>

  <!-- Section boxes -->
  <!-- Row 1: Logo -->
  <rect x="40" y="60" width="180" height="72" rx="10" fill="#8E4A63"/>
  <text x="130" y="91" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Business Logo</text>
  <text x="130" y="109" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Uploads immediately</text>
  <text x="130" y="124" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">No save button</text>

  <!-- Row 1: Business Info -->
  <rect x="260" y="60" width="180" height="72" rx="10" fill="#423F4C"/>
  <text x="350" y="91" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Business Info</text>
  <text x="350" y="109" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Name · Email · Phone</text>
  <text x="350" y="124" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Website</text>

  <!-- Row 2: Business Details -->
  <rect x="40" y="172" width="180" height="72" rx="10" fill="#423F4C"/>
  <text x="130" y="203" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Business Details</text>
  <text x="130" y="221" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Country · Currency · VAT</text>
  <text x="130" y="236" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Industry · Timezone</text>

  <!-- Row 2: Business Hours -->
  <rect x="260" y="172" width="180" height="72" rx="10" fill="#423F4C"/>
  <text x="350" y="203" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Business Hours</text>
  <text x="350" y="221" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">7 days · Open / Close</text>
  <text x="350" y="236" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Closed toggle per day</text>

  <!-- Row 3: Social Links -->
  <rect x="150" y="284" width="180" height="72" rx="10" fill="#423F4C"/>
  <text x="240" y="315" text-anchor="middle" fill="white"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600">Social Links</text>
  <text x="240" y="333" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Facebook · Instagram · X</text>
  <text x="240" y="348" text-anchor="middle" fill="#F0D793"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">TikTok · Snapchat</text>

  <!-- Save buttons legend -->
  <!-- Logo: immediate upload -->
  <rect x="490" y="70" width="270" height="52" rx="8" fill="white" stroke="#8E4A63" stroke-width="2"/>
  <text x="625" y="93" text-anchor="middle" fill="#8E4A63"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">File selected → uploads immediately</text>
  <text x="625" y="111" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Stored in Supabase Storage (logos bucket)</text>

  <!-- Business Info save -->
  <rect x="490" y="182" width="270" height="52" rx="8" fill="white" stroke="#423F4C" stroke-width="2"/>
  <text x="625" y="205" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">Save Changes</text>
  <text x="625" y="223" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Writes to organizations table columns</text>

  <!-- Details, Hours, Social save -->
  <rect x="490" y="294" width="270" height="62" rx="8" fill="white" stroke="#423F4C" stroke-width="2"/>
  <text x="625" y="315" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">Save Details / Save Hours / Save Social Links</text>
  <text x="625" y="334" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">All three write to organizations.settings</text>
  <text x="625" y="350" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">(JSONB column, merged update)</text>

  <!-- Connector lines (left sections to right labels) -->
  <!-- Logo to immediate upload -->
  <line x1="220" y1="96" x2="490" y2="96" stroke="#8E4A63" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Business Info to Save Changes -->
  <line x1="440" y1="96" x2="490" y2="208" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Business Details to extended save -->
  <line x1="220" y1="208" x2="490" y2="325" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Business Hours to extended save -->
  <line x1="440" y1="208" x2="490" y2="325" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Social to extended save -->
  <line x1="330" y1="320" x2="490" y2="325" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Access note at bottom -->
  <rect x="40" y="400" width="740" height="52" rx="8" fill="#F0D793" opacity="0.6"/>
  <text x="410" y="423" text-anchor="middle" fill="#423F4C"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="600">Access: Owners only</text>
  <text x="410" y="441" text-anchor="middle" fill="#6B6770"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11">Staff members who go to /settings see an access denied screen</text>
</svg>