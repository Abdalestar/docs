<svg viewBox="0 0 980 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="980" height="300" fill="#F8F5F2"/>
  <text x="32" y="44" font-size="20" font-weight="700" fill="#423F4C">Resetting a forgotten password</text>

  <!-- Step 1: Login -->
  <g>
    <rect x="32" y="78" width="160" height="150" rx="14" fill="#FFFFFF" stroke="#E3D7DD" stroke-width="1.5"/>
    <circle cx="112" cy="116" r="18" fill="#8E4A63"/>
    <text x="112" y="122" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="112" y="160" font-size="14" font-weight="700" fill="#423F4C" text-anchor="middle">Login page</text>
    <text x="112" y="184" font-size="12" fill="#6B6770" text-anchor="middle">Click</text>
    <text x="112" y="202" font-size="12" font-weight="700" fill="#8E4A63" text-anchor="middle">Forgot password?</text>
  </g>
  <path d="M198 153 L228 153" stroke="#8E4A63" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 2: Forgot Password -->
  <g>
    <rect x="234" y="78" width="160" height="150" rx="14" fill="#FFFFFF" stroke="#E3D7DD" stroke-width="1.5"/>
    <circle cx="314" cy="116" r="18" fill="#8E4A63"/>
    <text x="314" y="122" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="314" y="160" font-size="14" font-weight="700" fill="#423F4C" text-anchor="middle">Forgot Password</text>
    <text x="314" y="184" font-size="12" fill="#6B6770" text-anchor="middle">Enter your email,</text>
    <text x="314" y="202" font-size="12" fill="#6B6770" text-anchor="middle">tap Send Reset Link</text>
  </g>
  <path d="M400 153 L430 153" stroke="#8E4A63" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 3: Email -->
  <g>
    <rect x="436" y="78" width="160" height="150" rx="14" fill="#FFF8E8" stroke="#F0D793" stroke-width="2"/>
    <circle cx="516" cy="116" r="18" fill="#D4A855"/>
    <text x="516" y="122" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="516" y="160" font-size="14" font-weight="700" fill="#423F4C" text-anchor="middle">Check your email</text>
    <text x="516" y="184" font-size="12" fill="#6B6770" text-anchor="middle">Open the reset</text>
    <text x="516" y="202" font-size="12" fill="#6B6770" text-anchor="middle">link Qtap sends</text>
  </g>
  <path d="M602 153 L632 153" stroke="#8E4A63" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 4: Reset Password -->
  <g>
    <rect x="638" y="78" width="160" height="150" rx="14" fill="#FFFFFF" stroke="#E3D7DD" stroke-width="1.5"/>
    <circle cx="718" cy="116" r="18" fill="#8E4A63"/>
    <text x="718" y="122" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="718" y="160" font-size="14" font-weight="700" fill="#423F4C" text-anchor="middle">Reset Password</text>
    <text x="718" y="184" font-size="12" fill="#6B6770" text-anchor="middle">Set a new password,</text>
    <text x="718" y="202" font-size="12" fill="#6B6770" text-anchor="middle">confirm it, save</text>
  </g>
  <path d="M804 153 L834 153" stroke="#8E4A63" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <!-- Step 5: Done -->
  <g>
    <rect x="840" y="78" width="120" height="150" rx="14" fill="#8E4A63"/>
    <circle cx="900" cy="116" r="18" fill="#FFFFFF"/>
    <text x="900" y="122" font-size="16" font-weight="700" fill="#8E4A63" text-anchor="middle">5</text>
    <text x="900" y="160" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Signed in</text>
    <text x="900" y="184" font-size="12" fill="#F0D793" text-anchor="middle">Password</text>
    <text x="900" y="202" font-size="12" fill="#F0D793" text-anchor="middle">updated</text>
  </g>

  <text x="32" y="270" font-size="12.5" fill="#6B6770">The form on the Security page changes a password you already know. This flow is for when you are locked out and cannot sign in.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8E4A63"/>
    </marker>
  </defs>
</svg>
