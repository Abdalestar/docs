<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Merchants page: two states side by side">
  <rect width="820" height="320" fill="#F8F5F2" rx="12"/>

  <!-- Labels -->
  <text x="200" y="28" text-anchor="middle" fill="#8E4A63" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">No profile yet</text>
  <text x="620" y="28" text-anchor="middle" fill="#8E4A63" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Profile created</text>

  <!-- Divider -->
  <line x1="410" y1="40" x2="410" y2="290" stroke="#6B6770" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Empty state card -->
  <rect x="40" y="50" width="320" height="210" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Store icon circle -->
  <circle cx="200" cy="130" r="26" fill="#F8F5F2"/>
  <text x="200" y="137" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="22">⬡</text>
  <text x="200" y="178" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">No merchant yet</text>
  <text x="200" y="198" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">Create a merchant to show customers</text>
  <text x="200" y="212" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">your profile and loyalty cards.</text>
  <!-- Create button -->
  <rect x="148" y="228" width="104" height="26" rx="5" fill="#8E4A63"/>
  <text x="200" y="245" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">+ Create Merchant</text>

  <!-- RIGHT: Populated state card -->
  <rect x="440" y="50" width="340" height="210" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Logo placeholder -->
  <rect x="460" y="70" width="52" height="52" rx="8" fill="#F8F5F2" stroke="#e5e7eb" stroke-width="1"/>
  <text x="486" y="102" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">logo</text>
  <!-- Business name + badge -->
  <text x="524" y="88" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">My Coffee Shop</text>
  <rect x="524" y="94" width="42" height="16" rx="4" fill="#423F4C"/>
  <text x="545" y="106" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="10">Active</text>
  <!-- Meta row -->
  <text x="524" y="128" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">📍 Doha  ·  ☎ +974 1234 5678  ·  ★ 4.8</text>
  <!-- Stats row -->
  <rect x="460" y="142" width="305" height="44" rx="6" fill="#F8F5F2"/>
  <text x="490" y="160" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">320</text>
  <text x="490" y="174" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">members</text>
  <text x="570" y="160" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">4 120</text>
  <text x="570" y="174" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">stamps</text>
  <text x="650" y="160" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">182</text>
  <text x="650" y="174" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">redeemed</text>
  <text x="738" y="160" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">8 400</text>
  <text x="738" y="174" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">points</text>
  <!-- Action buttons -->
  <rect x="460" y="200" width="60" height="24" rx="5" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="490" y="216" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="11">Preview</text>
  <rect x="530" y="200" width="44" height="24" rx="5" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="552" y="216" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="11">Edit</text>
  <rect x="584" y="200" width="52" height="24" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="610" y="216" text-anchor="middle" fill="#991b1b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Delete</text>

  <!-- Bottom label -->
  <text x="410" y="308" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Settings → Merchants</text>
</svg>
