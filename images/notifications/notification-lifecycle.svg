<svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Notification lifecycle states: Draft, Scheduled, Sending, Sent, and Failed">
  <rect width="800" height="220" fill="#F8F5F2"/>

  <!-- Draft -->
  <rect x="30" y="80" width="120" height="60" rx="10" fill="#6B6770" opacity="0.15" stroke="#6B6770" stroke-width="1.5"/>
  <text x="90" y="107" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Draft</text>
  <text x="90" y="124" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">saved, not sent</text>

  <!-- Arrow Draft → Sending (Send Now) -->
  <line x1="152" y1="110" x2="248" y2="110" stroke="#423F4C" stroke-width="1.5"/>
  <polygon points="244,106 254,110 244,114" fill="#423F4C"/>
  <text x="200" y="103" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Send Now</text>

  <!-- Arrow Draft → Scheduled -->
  <path d="M 90 80 Q 90 50 280 50 Q 470 50 470 80" fill="none" stroke="#423F4C" stroke-width="1.5"/>
  <polygon points="466,76 476,80 466,84" fill="#423F4C"/>
  <text x="280" y="44" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">Schedule</text>

  <!-- Scheduled -->
  <rect x="360" y="80" width="140" height="60" rx="10" fill="#F0D793" opacity="0.4" stroke="#F0D793" stroke-width="1.5"/>
  <text x="430" y="107" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Scheduled</text>
  <text x="430" y="124" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">waiting for time</text>

  <!-- Arrow Scheduled → Sending -->
  <line x1="502" y1="110" x2="253" y2="110" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="257,114 247,110 257,106" fill="#423F4C"/>
  <text x="378" y="103" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">time reached</text>

  <!-- Sending -->
  <rect x="255" y="80" width="100" height="60" rx="10" fill="#8E4A63" opacity="0.2" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="305" y="107" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Sending</text>
  <text x="305" y="124" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">delivering…</text>

  <!-- Arrow Sending → Sent -->
  <line x1="357" y1="145" x2="560" y2="145" stroke="#423F4C" stroke-width="1.5"/>
  <polygon points="556,141 566,145 556,149" fill="#423F4C"/>
  <path d="M 357 110 Q 357 145 357 145" fill="none" stroke="#423F4C" stroke-width="1.5"/>

  <!-- Arrow Sending → Failed -->
  <line x1="255" y1="145" x2="100" y2="145" stroke="#8E4A63" stroke-width="1.5"/>
  <polygon points="104,149 94,145 104,141" fill="#8E4A63"/>
  <path d="M 255 110 Q 255 145 255 145" fill="none" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="177" y="162" text-anchor="middle" fill="#8E4A63" font-family="system-ui, -apple-system, sans-serif" font-size="10">error</text>

  <!-- Sent -->
  <rect x="567" y="80" width="120" height="60" rx="10" fill="#8E4A63" opacity="0.15" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="627" y="107" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Sent</text>
  <text x="627" y="124" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">stats available</text>

  <!-- Failed -->
  <rect x="30" y="155" width="120" height="50" rx="10" fill="#8E4A63" opacity="0.10" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="90" y="178" text-anchor="middle" fill="#8E4A63" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Failed</text>
  <text x="90" y="193" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="11">can be retried</text>
</svg>
