<svg viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Notification lifecycle diagram showing states from Draft through Scheduled or immediate Sending to Sent or Failed">
  <rect width="720" height="220" fill="#F8F5F2"/>
  <rect x="20" y="80" width="130" height="60" rx="12" fill="#ffffff" stroke="#6B6770" stroke-width="1.5"/>
  <text x="85" y="106" text-anchor="middle" fill="#423F4C" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Draft</text>
  <text x="85" y="123" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="11">Saved, not sent</text>
  <path d="M150 95 C185 95 185 50 220 50" fill="none" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="220,46 228,50 220,54" fill="#6B6770"/>
  <text x="183" y="43" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="10">Schedule for later</text>
  <path d="M150 125 C185 125 185 170 220 170" fill="none" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="220,166 228,170 220,174" fill="#6B6770"/>
  <text x="183" y="188" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="10">Send Now</text>
  <rect x="228" y="20" width="150" height="60" rx="12" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5"/>
  <text x="303" y="46" text-anchor="middle" fill="#423F4C" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Scheduled</text>
  <text x="303" y="63" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="11">Sends at set date/time</text>
  <path d="M378 50 C420 50 420 110 460 110" fill="none" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="460,106 468,110 460,114" fill="#6B6770"/>
  <text x="430" y="43" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="10">time arrives</text>
  <rect x="228" y="140" width="150" height="60" rx="12" fill="#FEFCE8" stroke="#EAB308" stroke-width="1.5"/>
  <text x="303" y="166" text-anchor="middle" fill="#423F4C" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Sending</text>
  <text x="303" y="183" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="11">Delivering now</text>
  <path d="M378 160 C420 160 420 130 460 130" fill="none" stroke="#6B6770" stroke-width="1.5"/>
  <polygon points="460,126 468,130 460,134" fill="#6B6770"/>
  <path d="M378 175 C420 175 420 175 460 175" fill="none" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="460,171 468,175 460,179" fill="#D32F2F"/>
  <text x="412" y="193" text-anchor="middle" fill="#D32F2F" font-family="system-ui,-apple-system,sans-serif" font-size="10">delivery error</text>
  <rect x="468" y="80" width="150" height="60" rx="12" fill="#F0FDF4" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="543" y="106" text-anchor="middle" fill="#423F4C" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Sent</text>
  <text x="543" y="123" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="11">Shows open/click rates</text>
  <rect x="468" y="155" width="150" height="55" rx="12" fill="#FEF2F2" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="543" y="179" text-anchor="middle" fill="#423F4C" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Failed</text>
  <text x="543" y="196" text-anchor="middle" fill="#6B6770" font-family="system-ui,-apple-system,sans-serif" font-size="11">OneSignal delivery error</text>
</svg>