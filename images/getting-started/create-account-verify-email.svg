<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Qtap signup: Check Your Email verification screen">
  <defs>
    <linearGradient id="authBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9F5F7"/>
      <stop offset="100%" stop-color="#F0EAF0"/>
    </linearGradient>
    <filter id="cardShadow2" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#8E4A63" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#authBg2)"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="760" height="480" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="20" y="20" width="760" height="36" rx="12" fill="#F0EDE9"/>
  <rect x="20" y="44" width="760" height="12" fill="#F0EDE9"/>
  <circle cx="44" cy="38" r="6" fill="#D8534F" opacity="0.7"/>
  <circle cx="62" cy="38" r="6" fill="#F0C752" opacity="0.7"/>
  <circle cx="80" cy="38" r="6" fill="#4CAF70" opacity="0.7"/>
  <rect x="120" y="30" width="520" height="16" rx="8" fill="white" stroke="#E5E0DC" stroke-width="1"/>
  <text x="380" y="42" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">dashboard.qtap.qa/verify-email</text>

  <!-- Page background inside browser -->
  <rect x="20" y="56" width="760" height="444" fill="url(#authBg2)"/>

  <!-- Auth card (vertically centered in browser content area) -->
  <rect x="244" y="138" width="312" height="234" rx="12" fill="white" stroke="#EDE0E8" stroke-width="1" filter="url(#cardShadow2)"/>

  <!-- Mail icon circle (light plum tint) -->
  <circle cx="400" cy="180" r="26" fill="#F5EEF1"/>
  <!-- Mail icon (simplified envelope) -->
  <rect x="386" y="169" width="28" height="20" rx="3" fill="none" stroke="#8E4A63" stroke-width="1.8"/>
  <polyline points="386,169 400,181 414,169" fill="none" stroke="#8E4A63" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="400" y="226" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="19" font-weight="700">Check Your Email</text>

  <!-- Description -->
  <text x="400" y="248" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">We&#x2019;ve sent a verification link to your email</text>
  <text x="400" y="264" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">address. Click the link to verify your account.</text>

  <!-- Hint -->
  <text x="400" y="287" text-anchor="middle" fill="#9E99A0" font-family="system-ui, -apple-system, sans-serif" font-size="11">Didn&#x2019;t receive the email? Check your spam folder.</text>

  <!-- Go to Login button (outline style) -->
  <rect x="334" y="302" width="132" height="34" rx="8" fill="white" stroke="#D8D4D8" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="13">Go to Login</text>

  <!-- Page footer -->
  <text x="400" y="488" text-anchor="middle" fill="#9E99A0" font-family="system-ui, -apple-system, sans-serif" font-size="10"><tspan fill="#8E4A63">Terms &amp; Conditions</tspan> &#xB7; <tspan fill="#8E4A63">Privacy Policy</tspan></text>
</svg>
