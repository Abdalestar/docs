<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Qtap onboarding wizard: Loyalty Type selection screen">
  <!-- Background -->
  <rect width="800" height="520" fill="#F8F5F2"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="760" height="480" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="20" y="20" width="760" height="36" rx="12" fill="#F0EDE9"/>
  <rect x="20" y="44" width="760" height="12" fill="#F0EDE9"/>
  <circle cx="44" cy="38" r="6" fill="#D8534F" opacity="0.7"/>
  <circle cx="62" cy="38" r="6" fill="#F0C752" opacity="0.7"/>
  <circle cx="80" cy="38" r="6" fill="#4CAF70" opacity="0.7"/>
  <rect x="120" y="30" width="520" height="16" rx="8" fill="white" stroke="#E5E0DC" stroke-width="1"/>
  <text x="380" y="42" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">dashboard.qtap.qa/onboarding</text>

  <!-- Progress bar (step 5 of 6) -->
  <rect x="200" y="66" width="400" height="4" rx="2" fill="#E5E0DC"/>
  <rect x="200" y="66" width="333" height="4" rx="2" fill="#8E4A63"/>
  <circle cx="200" cy="68" r="10" fill="#8E4A63"/>
  <text x="200" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="10">&#x2713;</text>
  <circle cx="267" cy="68" r="10" fill="#8E4A63"/>
  <text x="267" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="10">&#x2713;</text>
  <circle cx="333" cy="68" r="10" fill="#8E4A63"/>
  <text x="333" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="10">&#x2713;</text>
  <circle cx="400" cy="68" r="10" fill="#8E4A63"/>
  <text x="400" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="10">&#x2713;</text>
  <circle cx="467" cy="68" r="10" fill="#8E4A63" stroke="white" stroke-width="2"/>
  <text x="467" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" font-weight="700">5</text>
  <circle cx="533" cy="68" r="10" fill="#E5E0DC"/>
  <text x="533" y="72" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="10">6</text>
  <text x="467" y="90" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="9" font-weight="600">Loyalty</text>

  <!-- Headline -->
  <text x="400" y="124" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="22" font-weight="700">Choose your loyalty program</text>
  <text x="400" y="144" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="13">Select the type that best fits your business</text>

  <!-- Stamp Cards card - SELECTED -->
  <rect x="80" y="162" width="280" height="260" rx="14" fill="white" stroke="#8E4A63" stroke-width="2"/>
  <rect x="80" y="162" width="280" height="260" rx="14" fill="#8E4A63" fill-opacity="0.03"/>
  <circle cx="336" cy="176" r="12" fill="#8E4A63"/>
  <text x="336" y="181" text-anchor="middle" fill="white" font-family="system-ui" font-size="12">&#x2713;</text>

  <rect x="104" y="178" width="48" height="48" rx="12" fill="#8E4A63"/>
  <text x="128" y="209" text-anchor="middle" fill="white" font-family="system-ui" font-size="24">&#x1F4B3;</text>
  <text x="220" y="250" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="18" font-weight="700">Stamp Cards</text>
  <text x="220" y="268" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="11">Classic loyalty cards where customers</text>
  <text x="220" y="282" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="11">collect stamps for each purchase</text>

  <line x1="104" y1="298" x2="336" y2="298" stroke="#E5E0DC" stroke-width="1"/>

  <circle cx="116" cy="316" r="8" fill="#F5EEF1"/>
  <text x="116" y="320" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="132" y="320" fill="#6B6770" font-family="system-ui" font-size="11">Digital stamp cards</text>

  <circle cx="116" cy="336" r="8" fill="#F5EEF1"/>
  <text x="116" y="340" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="132" y="340" fill="#6B6770" font-family="system-ui" font-size="11">Customizable designs</text>

  <circle cx="116" cy="356" r="8" fill="#F5EEF1"/>
  <text x="116" y="360" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="132" y="360" fill="#6B6770" font-family="system-ui" font-size="11">Automatic rewards</text>

  <circle cx="116" cy="376" r="8" fill="#F5EEF1"/>
  <text x="116" y="380" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="132" y="380" fill="#6B6770" font-family="system-ui" font-size="11">Birthday bonuses</text>

  <text x="122" y="408" fill="#423F4C" font-family="system-ui" font-size="10" font-weight="600">Best for:</text>
  <text x="176" y="408" fill="#6B6770" font-family="system-ui" font-size="10">Coffee shops, bakeries, salons</text>

  <!-- Points Program card -->
  <rect x="440" y="162" width="280" height="260" rx="14" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>

  <rect x="464" y="178" width="48" height="48" rx="12" fill="#F5EEF1"/>
  <text x="488" y="209" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="24">&#x1FA99;</text>
  <text x="580" y="250" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="18" font-weight="700">Points Program</text>
  <text x="580" y="268" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="11">Flexible points system based</text>
  <text x="580" y="282" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="11">on spending</text>

  <line x1="464" y1="298" x2="696" y2="298" stroke="#E5E0DC" stroke-width="1"/>

  <circle cx="476" cy="316" r="8" fill="#F5EEF1"/>
  <text x="476" y="320" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="492" y="320" fill="#6B6770" font-family="system-ui" font-size="11">Points per currency spent</text>

  <circle cx="476" cy="336" r="8" fill="#F5EEF1"/>
  <text x="476" y="340" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="492" y="340" fill="#6B6770" font-family="system-ui" font-size="11">Tiered rewards</text>

  <circle cx="476" cy="356" r="8" fill="#F5EEF1"/>
  <text x="476" y="360" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="492" y="360" fill="#6B6770" font-family="system-ui" font-size="11">Multiple reward options</text>

  <circle cx="476" cy="376" r="8" fill="#F5EEF1"/>
  <text x="476" y="380" text-anchor="middle" fill="#8E4A63" font-size="8" font-family="system-ui">&#x2713;</text>
  <text x="492" y="380" fill="#6B6770" font-family="system-ui" font-size="11">Advanced analytics</text>

  <text x="482" y="408" fill="#423F4C" font-family="system-ui" font-size="10" font-weight="600">Best for:</text>
  <text x="536" y="408" fill="#6B6770" font-family="system-ui" font-size="10">Retail stores, services</text>

  <!-- Navigation -->
  <rect x="284" y="448" width="100" height="36" rx="8" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <text x="334" y="470" text-anchor="middle" fill="#423F4C" font-family="system-ui" font-size="13">Back</text>
  <rect x="416" y="448" width="120" height="36" rx="8" fill="#8E4A63"/>
  <text x="476" y="470" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="600">Continue</text>
</svg>