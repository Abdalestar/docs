<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="460" fill="#f9f7f4" rx="12"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#423F4C">Dashboard sections at a glance</text>

  <!-- Sidebar box -->
  <rect x="30" y="60" width="140" height="370" rx="8" fill="#423F4C"/>
  <text x="100" y="85" text-anchor="middle" font-size="11" fill="#F0D793" font-weight="600">SIDEBAR</text>

  <!-- Sidebar items -->
  <rect x="40" y="95" width="120" height="28" rx="5" fill="#8E4A63"/>
  <text x="100" y="114" text-anchor="middle" font-size="12" fill="white" font-weight="600">Home</text>

  <rect x="40" y="130" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="149" text-anchor="middle" font-size="12" fill="#F0D793">Stamp Cards / Points</text>

  <rect x="40" y="165" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="184" text-anchor="middle" font-size="12" fill="#F0D793">Members</text>

  <rect x="40" y="200" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="219" text-anchor="middle" font-size="12" fill="#F0D793">QR Codes</text>

  <rect x="40" y="235" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="254" text-anchor="middle" font-size="12" fill="#F0D793">NFC Tags</text>

  <rect x="40" y="270" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="289" text-anchor="middle" font-size="12" fill="#F0D793">Campaigns</text>

  <rect x="40" y="305" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="324" text-anchor="middle" font-size="12" fill="#F0D793">Analytics</text>

  <rect x="40" y="340" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="359" text-anchor="middle" font-size="12" fill="#F0D793">Staff</text>

  <rect x="40" y="375" width="120" height="28" rx="5" fill="#5a4a6e"/>
  <text x="100" y="394" text-anchor="middle" font-size="12" fill="#F0D793">Settings</text>

  <!-- Connector lines -->
  <line x1="160" y1="109" x2="200" y2="109" stroke="#8E4A63" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="160" y1="144" x2="200" y2="185" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="179" x2="200" y2="257" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="214" x2="200" y2="329" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="249" x2="200" y2="401" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="319" x2="440" y2="108" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="354" x2="440" y2="185" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="389" x2="440" y2="257" stroke="#6b5a7a" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Section cards - left column -->
  <!-- Home -->
  <rect x="200" y="72" width="200" height="72" rx="8" fill="white" stroke="#8E4A63" stroke-width="2"/>
  <text x="300" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#8E4A63">Home</text>
  <text x="300" y="113" text-anchor="middle" font-size="11" fill="#666">Stats · activity chart</text>
  <text x="300" y="129" text-anchor="middle" font-size="11" fill="#666">Quick actions · recent feed</text>

  <!-- Loyalty -->
  <rect x="200" y="155" width="200" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
