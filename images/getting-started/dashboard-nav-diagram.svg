  <text x="300" y="197" text-anchor="middle" font-size="11" fill="#666">Create · design · set rewards</text>

  <!-- Members -->
  <rect x="200" y="227" width="200" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="300" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Members</text>
  <text x="300" y="269" text-anchor="middle" font-size="11" fill="#666">Enrolled customers · profiles</text>

  <!-- QR + NFC -->
  <rect x="200" y="299" width="200" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="300" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">QR Codes &amp; NFC</text>
  <text x="300" y="341" text-anchor="middle" font-size="11" fill="#666">How customers check in</text>

  <!-- Campaigns -->
  <rect x="200" y="371" width="200" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="300" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Campaigns</text>
  <text x="300" y="413" text-anchor="middle" font-size="11" fill="#666">Birthday · win-back · milestone</text>

  <!-- Section cards - right column -->
  <!-- Analytics -->
  <rect x="440" y="72" width="175" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="527" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Analytics</text>
  <text x="527" y="114" text-anchor="middle" font-size="11" fill="#666">Stamps · revenue · trends</text>

  <!-- Staff -->
  <rect x="440" y="155" width="175" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="527" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Staff</text>
  <text x="527" y="197" text-anchor="middle" font-size="11" fill="#666">Invite · roles · permissions</text>

  <!-- Settings -->
  <rect x="440" y="227" width="175" height="60" rx="8" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="527" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Settings</text>
  <text x="527" y="269" text-anchor="middle" font-size="11" fill="#666">Billing · locations · merchant page</text>

  <!-- Legend -->
  <rect x="640" y="72" width="160" height="105" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="720" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#423F4C">Key</text>
  <rect x="654" y="103" width="14" height="14" rx="3" fill="#8E4A63"/>
  <text x="674" y="115" font-size="11" fill="#555">Current section</text>
  <rect x="654" y="123" width="14" height="14" rx="3" fill="#5a4a6e"/>
  <text x="674" y="135" font-size="11" fill="#555">Other nav items</text>
  <rect x="654" y="143" width="14" height="14" rx="3" fill="white" stroke="#6b5a7a" stroke-width="1.5"/>
  <text x="674" y="155" font-size="11" fill="#555">Section detail</text>

  <!-- Footer note -->
  <text x="410" y="448" text-anchor="middle" font-size="11" fill="#999">Stamp Cards appears as "Points" for merchants on a points-based program</text>
</svg>
