<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Qtap onboarding wizard: Business Type selection screen">
  <!-- Background -->
  <rect width="800" height="520" fill="#F8F5F2"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="760" height="480" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="20" y="20" width="760" height="36" rx="12" fill="#F0EDE9"/>
  <rect x="20" y="44" width="760" height="12" fill="#F0EDE9"/>
  <circle cx="44" cy="38" r="6" fill="#D8534F" opacity="0.7"/>
  <circle cx="62" cy="38" r="6" fill="#F0C752" opacity="0.7"/>
  <circle cx="80" cy="38" r="6" fill="#4CAF70" opacity="0.7"/>
  <rect x="120" y="30" width="520" height="16" rx="8" fill="white" stroke="#E5E0DC" stroke-width="1"/>
  <text x="380" y="42" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">dashboard.qtap.qa/onboarding</text>

  <!-- Progress bar (step 1 of 6) -->
  <rect x="200" y="66" width="400" height="4" rx="2" fill="#E5E0DC"/>
  <rect x="200" y="66" width="67" height="4" rx="2" fill="#8E4A63"/>
  <circle cx="200" cy="68" r="10" fill="#8E4A63"/>
  <text x="200" y="72" text-anchor="middle" fill="white" font-family="system-ui" font-size="10" font-weight="600">1</text>
  <circle cx="267" cy="68" r="10" fill="#E5E0DC"/>
  <text x="267" y="72" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="10">2</text>
  <circle cx="333" cy="68" r="10" fill="#E5E0DC"/>
  <text x="333" y="72" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="10">3</text>
  <circle cx="400" cy="68" r="10" fill="#E5E0DC"/>
  <text x="400" y="72" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="10">4</text>
  <circle cx="467" cy="68" r="10" fill="#E5E0DC"/>
  <text x="467" y="72" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="10">5</text>
  <circle cx="533" cy="68" r="10" fill="#E5E0DC"/>
  <text x="533" y="72" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="10">6</text>
  <text x="200" y="90" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="9" font-weight="600">Business Type</text>
  <text x="267" y="90" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="9">Goal</text>
  <text x="333" y="90" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="9">Business</text>
  <text x="400" y="90" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="9">Location</text>
  <text x="467" y="90" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="9">Loyalty</text>
  <text x="533" y="90" text-anchor="middle" fill="#6B6770" font-family="system-ui" font-size="9">Payment</text>

  <!-- Headline -->
  <text x="400" y="130" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="22" font-weight="700">What type of business are you?</text>
  <text x="400" y="150" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="13">This helps us personalize your experience</text>

  <!-- Cafe/Coffee Shop - SELECTED -->
  <rect x="172" y="170" width="140" height="100" rx="12" fill="white" stroke="#8E4A63" stroke-width="2"/>
  <rect x="172" y="170" width="140" height="100" rx="12" fill="#8E4A63" fill-opacity="0.03"/>
  <circle cx="290" cy="182" r="9" fill="#8E4A63"/>
  <text x="290" y="186" text-anchor="middle" fill="white" font-family="system-ui" font-size="9">&#x2713;</text>
  <rect x="206" y="186" width="40" height="40" rx="10" fill="#8E4A63"/>
  <text x="226" y="213" text-anchor="middle" fill="white" font-family="system-ui" font-size="20">&#x2615;</text>
  <text x="242" y="242" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Cafe / Coffee</text>
  <text x="242" y="256" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Shop</text>

  <!-- Restaurant -->
  <rect x="330" y="170" width="140" height="100" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="370" y="186" width="40" height="40" rx="10" fill="#F5EEF1"/>
  <text x="390" y="213" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="18">&#x1F374;</text>
  <text x="400" y="249" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Restaurant</text>

  <!-- Salon/Spa -->
  <rect x="488" y="170" width="140" height="100" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="528" y="186" width="40" height="40" rx="10" fill="#F5EEF1"/>
  <text x="548" y="213" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="18">&#x2702;</text>
  <text x="558" y="249" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Salon / Spa</text>

  <!-- Retail Store -->
  <rect x="172" y="286" width="140" height="100" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="212" y="302" width="40" height="40" rx="10" fill="#F5EEF1"/>
  <text x="232" y="329" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="18">&#x1F6CD;</text>
  <text x="242" y="365" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Retail Store</text>

  <!-- Gym/Fitness -->
  <rect x="330" y="286" width="140" height="100" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="370" y="302" width="40" height="40" rx="10" fill="#F5EEF1"/>
  <text x="390" y="329" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="18">&#x1F3CB;</text>
  <text x="400" y="365" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Gym / Fitness</text>

  <!-- Other -->
  <rect x="488" y="286" width="140" height="100" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="528" y="302" width="40" height="40" rx="10" fill="#F5EEF1"/>
  <text x="548" y="329" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="18">&#x1F3E2;</text>
  <text x="558" y="365" text-anchor="middle" fill="#423F4C" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Other</text>

  <!-- Continue button -->
  <rect x="322" y="404" width="156" height="40" rx="8" fill="#8E4A63"/>
  <text x="400" y="428" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Continue</text>
</svg>