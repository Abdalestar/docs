<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Qtap onboarding wizard: Welcome screen">
  <!-- Background -->
  <rect width="800" height="520" fill="#F8F5F2"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="760" height="480" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="20" y="20" width="760" height="36" rx="12" fill="#F0EDE9"/>
  <rect x="20" y="44" width="760" height="12" fill="#F0EDE9"/>
  <circle cx="44" cy="38" r="6" fill="#D8534F" opacity="0.7"/>
  <circle cx="62" cy="38" r="6" fill="#F0C752" opacity="0.7"/>
  <circle cx="80" cy="38" r="6" fill="#4CAF70" opacity="0.7"/>
  <rect x="120" y="30" width="520" height="16" rx="8" fill="white" stroke="#E5E0DC" stroke-width="1"/>
  <text x="380" y="42" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">dashboard.qtap.qa/onboarding</text>

  <!-- Page bg gradient hint -->
  <rect x="20" y="56" width="760" height="444" fill="url(#pageGrad)" rx="0"/>
  <defs>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F5F2"/>
      <stop offset="100%" stop-color="#F0EDE9"/>
    </linearGradient>
  </defs>

  <!-- Q logo circle -->
  <rect x="344" y="80" width="112" height="112" rx="28" fill="url(#qGrad)"/>
  <defs>
    <linearGradient id="qGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E4A63"/>
      <stop offset="100%" stop-color="#7A3F55"/>
    </linearGradient>
  </defs>
  <text x="400" y="155" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="52" font-weight="700">Q</text>
  <!-- sparkle badge -->
  <circle cx="456" cy="86" r="14" fill="#F0D793"/>
  <text x="456" y="91" text-anchor="middle" fill="#423F4C" font-family="system-ui" font-size="12">&#x2726;</text>

  <!-- Headline -->
  <text x="400" y="224" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="28" font-weight="700">Welcome to Qtap</text>
  <text x="400" y="248" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="14">Start your 14-day free trial of our Growth plan.</text>

  <!-- Trial card -->
  <rect x="260" y="268" width="280" height="120" rx="14" fill="white" stroke="#E8D9E0" stroke-width="1.5"/>
  <text x="288" y="292" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">YOUR TRIAL INCLUDES</text>
  <!-- Feature rows -->
  <circle cx="286" cy="312" r="8" fill="#F5EEF1"/>
  <text x="286" y="316" text-anchor="middle" fill="#8E4A63" font-size="9" font-family="system-ui">&#x2713;</text>
  <text x="300" y="316" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Up to 2 locations &amp; 5 staff members</text>

  <circle cx="286" cy="332" r="8" fill="#F5EEF1"/>
  <text x="286" y="336" text-anchor="middle" fill="#8E4A63" font-size="9" font-family="system-ui">&#x2713;</text>
  <text x="300" y="336" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Up to 3 loyalty cards with custom designs</text>

  <circle cx="286" cy="352" r="8" fill="#F5EEF1"/>
  <text x="286" y="356" text-anchor="middle" fill="#8E4A63" font-size="9" font-family="system-ui">&#x2713;</text>
  <text x="300" y="356" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">AI-powered business insights</text>

  <circle cx="286" cy="372" r="8" fill="#F5EEF1"/>
  <text x="286" y="376" text-anchor="middle" fill="#8E4A63" font-size="9" font-family="system-ui">&#x2713;</text>
  <text x="300" y="376" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Full analytics dashboard</text>

  <!-- Get Started button -->
  <rect x="304" y="408" width="192" height="44" rx="10" fill="#8E4A63"/>
  <text x="400" y="435" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">Get Started</text>
</svg>