<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Qtap onboarding wizard: Setup complete screen">
  <!-- Background -->
  <rect width="800" height="520" fill="#F8F5F2"/>

  <!-- Browser chrome -->
  <rect x="20" y="20" width="760" height="480" rx="12" fill="white" stroke="#E5E0DC" stroke-width="1.5"/>
  <rect x="20" y="20" width="760" height="36" rx="12" fill="#F0EDE9"/>
  <rect x="20" y="44" width="760" height="12" fill="#F0EDE9"/>
  <circle cx="44" cy="38" r="6" fill="#D8534F" opacity="0.7"/>
  <circle cx="62" cy="38" r="6" fill="#F0C752" opacity="0.7"/>
  <circle cx="80" cy="38" r="6" fill="#4CAF70" opacity="0.7"/>
  <rect x="120" y="30" width="520" height="16" rx="8" fill="white" stroke="#E5E0DC" stroke-width="1"/>
  <text x="380" y="42" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10">dashboard.qtap.qa/onboarding</text>

  <!-- Celebration icon -->
  <defs>
    <linearGradient id="doneGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E4A63"/>
      <stop offset="100%" stop-color="#F0D793"/>
    </linearGradient>
  </defs>
  <rect x="344" y="76" width="112" height="112" rx="28" fill="url(#doneGrad)"/>
  <text x="400" y="148" text-anchor="middle" fill="white" font-family="system-ui" font-size="52">&#x1F389;</text>

  <!-- Headline -->
  <text x="400" y="222" text-anchor="middle" fill="#423F4C" font-family="Georgia, serif" font-size="28" font-weight="700">You're all set!</text>
  <text x="400" y="246" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="14">Your business is ready to start rewarding customers.</text>
  <text x="400" y="264" text-anchor="middle" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="14">Create your first stamp card to get going.</text>

  <!-- What's next card -->
  <rect x="248" y="280" width="304" height="160" rx="14" fill="white" stroke="#E8D9E0" stroke-width="1.5"/>
  <text x="270" y="306" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">WHAT'S NEXT</text>

  <circle cx="274" cy="328" r="12" fill="#F5EEF1"/>
  <text x="274" y="333" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="11" font-weight="700">1</text>
  <text x="294" y="332" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Design your stamp card</text>

  <circle cx="274" cy="358" r="12" fill="#F5EEF1"/>
  <text x="274" y="363" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="11" font-weight="700">2</text>
  <text x="294" y="362" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Set up rewards for customers</text>

  <circle cx="274" cy="388" r="12" fill="#F5EEF1"/>
  <text x="274" y="393" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="11" font-weight="700">3</text>
  <text x="294" y="392" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Print or share your QR code</text>

  <circle cx="274" cy="418" r="12" fill="#F5EEF1"/>
  <text x="274" y="423" text-anchor="middle" fill="#8E4A63" font-family="system-ui" font-size="11" font-weight="700">4</text>
  <text x="294" y="422" fill="#6B6770" font-family="system-ui, -apple-system, sans-serif" font-size="12">Start collecting loyal customers</text>

  <!-- CTA button -->
  <rect x="240" y="460" width="320" height="44" rx="10" fill="#8E4A63"/>
  <text x="400" y="487" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">Create Your First Card</text>
</svg>