<svg viewBox="0 0 780 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" role="img" aria-label="How a customer becomes a member: scanning with the Qtap app auto-enrolls them; an anonymous scan does not.">
  <rect width="780" height="500" fill="#F8F5F2"/>
  <text x="390" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#423F4C">How a customer becomes a member</text>

  <!-- Start -->
  <rect x="240" y="68" width="300" height="58" rx="14" fill="#8E4A63"/>
  <text x="390" y="93" text-anchor="middle" font-size="14.5" font-weight="600" fill="#ffffff">A customer scans your QR code</text>
  <text x="390" y="113" text-anchor="middle" font-size="14.5" font-weight="600" fill="#ffffff">or taps your NFC tag at the counter</text>

  <!-- connector -->
  <line x1="390" y1="126" x2="390" y2="158" stroke="#423F4C" stroke-width="2"/>
  <polygon points="390,166 385,156 395,156" fill="#423F4C"/>

  <!-- Decision diamond -->
  <polygon points="390,168 520,238 390,308 260,238" fill="#F0D793" stroke="#423F4C" stroke-width="2"/>
  <text x="390" y="232" text-anchor="middle" font-size="14.5" font-weight="700" fill="#423F4C">Are they using</text>
  <text x="390" y="252" text-anchor="middle" font-size="14.5" font-weight="700" fill="#423F4C">the Qtap app?</text>

  <!-- Yes branch (left/down) -->
  <line x1="390" y1="308" x2="390" y2="340" stroke="#423F4C" stroke-width="2"/>
  <polygon points="390,348 385,338 395,338" fill="#423F4C"/>
  <text x="406" y="330" font-size="13" font-weight="700" fill="#4CAF50">Yes</text>

  <rect x="225" y="348" width="330" height="70" rx="14" fill="#ffffff" stroke="#8E4A63" stroke-width="2"/>
  <text x="390" y="376" text-anchor="middle" font-size="14" font-weight="600" fill="#423F4C">Qtap creates their member record and</text>
  <text x="390" y="396" text-anchor="middle" font-size="14" font-weight="600" fill="#423F4C">adds them to your Members list. The same</text>
  <text x="390" y="409" text-anchor="middle" font-size="11.5" fill="#6B6770">scan also adds the stamp or points they earned.</text>

  <!-- No branch (right) -->
  <line x1="520" y1="238" x2="650" y2="238" stroke="#423F4C" stroke-width="2"/>
  <polygon points="658,238 648,233 648,243" fill="#423F4C"/>
  <text x="560" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#6B6770">No</text>

  <rect x="612" y="196" width="150" height="86" rx="14" fill="#ffffff" stroke="#6B6770" stroke-width="1.5"/>
  <text x="687" y="222" text-anchor="middle" font-size="12.5" font-weight="600" fill="#423F4C">Anonymous scan.</text>
  <text x="687" y="241" text-anchor="middle" font-size="11.5" fill="#6B6770">The visit is counted,</text>
  <text x="687" y="257" text-anchor="middle" font-size="11.5" fill="#6B6770">but no one joins and</text>
  <text x="687" y="273" text-anchor="middle" font-size="11.5" fill="#6B6770">nothing is awarded.</text>

  <!-- Footnote -->
  <text x="390" y="460" text-anchor="middle" font-size="12.5" fill="#6B6770">You never add members by hand. There is no Add Member button: the list fills itself as people visit.</text>
</svg>
