<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 1180" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D793"/>
      <stop offset="1" stop-color="#E7C9A6"/>
    </linearGradient>
  </defs>

  <rect width="940" height="1180" fill="#FFFFFF"/>
  <text x="60" y="46" font-size="26" font-weight="700" fill="#423F4C">What customers see on your public page</text>
  <text x="60" y="74" font-size="15" fill="#6B6770">A fully set-up page at dashboard.qtap.qa/m/your-slug. Sections fill in as you add them.</text>

  <!-- Phone frame -->
  <rect x="60" y="100" width="360" height="1040" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Top bar -->
  <circle cx="98" cy="146" r="18" fill="#F2F2F2"/>
  <text x="98" y="152" font-size="16" fill="#423F4C" text-anchor="middle">×</text>
  <text x="240" y="151" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Qahwa Cafe</text>
  <circle cx="382" cy="146" r="18" fill="#F2F2F2"/>
  <path d="M376 138h12v18l-6-4-6 4z" fill="#423F4C"/>

  <!-- Cover gallery -->
  <rect x="84" y="180" width="312" height="132" rx="14" fill="url(#cover)"/>
  <circle cx="232" cy="300" r="3.5" fill="#FFFFFF"/>
  <circle cx="244" cy="300" r="3.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="256" cy="300" r="3.5" fill="#FFFFFF" fill-opacity="0.5"/>
  <!-- Logo -->
  <circle cx="360" cy="312" r="30" fill="#FFFFFF" stroke="#F3F4F6"/>
  <circle cx="360" cy="312" r="20" fill="#8E4A63"/>

  <!-- Name + description -->
  <text x="100" y="360" font-size="17" font-weight="700" fill="#111827">Qahwa Cafe</text>
  <rect x="100" y="374" width="250" height="9" rx="4" fill="#EFEFF1"/>
  <rect x="100" y="390" width="210" height="9" rx="4" fill="#EFEFF1"/>

  <!-- Chips -->
  <rect x="100" y="414" width="120" height="40" rx="20" fill="#F2F2F2"/>
  <text x="160" y="439" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Cafe</text>
  <rect x="230" y="414" width="150" height="40" rx="20" fill="#FFFFFF" stroke="#F2F2F2"/>
  <text x="305" y="439" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">180+ members</text>

  <!-- Current card heading -->
  <text x="100" y="492" font-size="14" font-weight="700" fill="#111827">Current card</text>

  <!-- Loyalty card -->
  <rect x="100" y="506" width="280" height="120" rx="16" fill="#8E4A63"/>
  <text x="118" y="534" font-size="13" font-weight="700" fill="#FFFFFF">Qahwa Cafe</text>
  <text x="118" y="552" font-size="10" fill="#F0D793">Buy 9 coffees, get the 10th free</text>
  <g fill="#F0D793">
    <circle cx="124" cy="582" r="9"/><circle cx="150" cy="582" r="9"/><circle cx="176" cy="582" r="9"/>
    <circle cx="202" cy="582" r="9"/><circle cx="228" cy="582" r="9"/><circle cx="254" cy="582" r="9"/>
  </g>
  <g fill="none" stroke="#F0D793" stroke-opacity="0.4" stroke-width="1.5">
    <circle cx="280" cy="582" r="9"/><circle cx="306" cy="582" r="9"/><circle cx="332" cy="582" r="9"/><circle cx="358" cy="582" r="9"/>
  </g>

  <!-- Tap for full terms -->
  <rect x="100" y="642" width="280" height="36" rx="18" fill="#FBF6E4"/>
  <text x="240" y="665" font-size="13" font-weight="600" fill="#111827" text-anchor="middle">Tap for full terms</text>

  <!-- Buttons -->
  <rect x="100" y="692" width="134" height="50" rx="12" fill="#8E4A63"/>
  <text x="167" y="722" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Add a card</text>
  <rect x="246" y="692" width="134" height="50" rx="12" fill="#423F4C"/>
  <text x="313" y="722" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Reward option</text>

  <!-- Join card -->
  <rect x="100" y="756" width="280" height="92" rx="12" fill="#F2F2F2"/>
  <circle cx="146" cy="800" r="30" fill="#FFFFFF"/>
  <text x="146" y="810" font-size="24" text-anchor="middle">🎁</text>
  <text x="192" y="792" font-size="13" font-weight="700" fill="#423F4C">Join and get rewards</text>
  <text x="192" y="810" font-size="13" font-weight="700" fill="#423F4C">for your actions</text>
  <rect x="290" y="816" width="80" height="30" rx="8" fill="#F0D793"/>
  <text x="330" y="836" font-size="13" font-weight="600" fill="#423F4C" text-anchor="middle">Join Now</text>

  <!-- Contacts -->
  <text x="100" y="884" font-size="14" font-weight="700" fill="#111827">Contacts</text>
  <text x="100" y="908" font-size="12" fill="#6B6770">Everyday</text>
  <text x="100" y="926" font-size="12" fill="#111827">09:00 AM - 10:00 PM</text>
  <text x="250" y="908" font-size="12" fill="#6B6770">Phone</text>
  <text x="250" y="926" font-size="12" fill="#111827">+974 4012 7700</text>

  <!-- Directions + Call -->
  <rect x="100" y="946" width="280" height="44" rx="12" fill="#8E4A63"/>
  <text x="240" y="974" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Directions</text>
  <rect x="100" y="1000" width="280" height="44" rx="12" fill="#FFFFFF" stroke="#F2F2F2" stroke-width="2"/>
  <text x="240" y="1028" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">Call</text>

  <!-- Footer -->
  <text x="240" y="1075" font-size="10" fill="#9CA3AF" text-anchor="middle">Terms &amp; Conditions  ·  Privacy Policy</text>

  <!-- Callouts -->
  <g font-size="14" fill="#423F4C">
    <line x1="396" y1="246" x2="520" y2="246" stroke="#8E4A63" stroke-width="1.5"/>
    <circle cx="520" cy="246" r="4" fill="#8E4A63"/>
    <text x="534" y="242" font-weight="700">Cover gallery</text>
    <text x="534" y="262" fill="#6B6770" font-size="13">Up to five photos, plus your logo.</text>

    <line x1="350" y1="382" x2="520" y2="382" stroke="#8E4A63" stroke-width="1.5"/>
    <circle cx="520" cy="382" r="4" fill="#8E4A63"/>
    <text x="534" y="378" font-weight="700">Name, description, category</text>
    <text x="534" y="398" fill="#6B6770" font-size="13">Your name and a short line about what you offer.</text>

    <line x1="380" y1="434" x2="520" y2="470" stroke="#8E4A63" stroke-width="1.5"/>
    <circle cx="520" cy="470" r="4" fill="#8E4A63"/>
    <text x="534" y="466" font-weight="700">Live member count</text>
    <text x="534" y="486" fill="#6B6770" font-size="13">A real count from your members, not typed in.</text>

    <line x1="380" y1="566" x2="520" y2="566" stroke="#8E4A63" stroke-width="1.5"/>
    <circle cx="520" cy="566" r="4" fill="#8E4A63"/>
    <text x="534" y="562" font-weight="700">Featured loyalty cards</text>
    <text x="534" y="582" fill="#6B6770" font-size="13">The active cards you feature, with their rewards.</text>

    <line x1="380" y1="802" x2="520" y2="802" stroke="#8E4A63" stroke-width="1.5"/>
    <circle cx="520" cy="802" r="4" fill="#8E4A63"/>
    <text x="534" y="798" font-weight="700">Join Now</text>
    <text x="534" y="818" fill="#6B6770" font-size="13">Adds the card to the customer's Qtap wallet.</text>

    <line x1="380" y1="968" x2="520" y2="968" stroke="#8E4A63" stroke-width="1.5"/>
    <circle cx="520" cy="968" r="4" fill="#8E4A63"/>
    <text x="534" y="964" font-weight="700">Hours, phone, directions</text>
    <text x="534" y="984" fill="#6B6770" font-size="13">Directions opens Maps; Call dials your branch.</text>
  </g>
</svg>
