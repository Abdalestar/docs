<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="820" height="480" fill="#f9f8fc" rx="12"/>

  <!-- Title -->
  <text x="410" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#423F4C">Merchant Page Editor</text>

  <!-- ── LEFT COLUMN: Editor sections ── -->

  <!-- Section 1: Merchant Profile -->
  <rect x="30" y="52" width="240" height="170" rx="8" fill="#ffffff" stroke="#8E4A63" stroke-width="1.5"/>
  <rect x="30" y="52" width="240" height="28" rx="8" fill="#8E4A63"/>
  <rect x="30" y="68" width="240" height="12" rx="0" fill="#8E4A63"/>
  <text x="150" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Merchant Profile</text>
  <text x="46" y="98" font-size="9.5" fill="#423F4C">Merchant Name</text>
  <text x="46" y="113" font-size="9.5" fill="#423F4C">Cover Photo  ·  PNG/JPEG  ·  5MB  ·  1200×600px</text>
  <text x="46" y="128" font-size="9.5" fill="#423F4C">Merchant Logo  ·  PNG/JPEG/SVG  ·  10MB</text>
  <text x="46" y="143" font-size="9.5" fill="#423F4C">Transparent Logo  ·  PNG  ·  512×512px  ·  stamp icon</text>
  <text x="46" y="158" font-size="9.5" fill="#423F4C">Description  ·  textarea</text>
  <text x="46" y="173" font-size="9.5" fill="#423F4C">Google Rating  ·  slider  ·  0.0–5.0</text>
  <text x="46" y="188" font-size="9.5" fill="#423F4C">Category  ·  Restaurants / Cafes / Retail / …</text>
  <text x="46" y="207" font-size="9" fill="#7a7080" font-style="italic">Changes update live preview in real time</text>

  <!-- Section 2: Location Details -->
  <rect x="30" y="238" width="240" height="108" rx="8" fill="#ffffff" stroke="#8E4A63" stroke-width="1.5"/>
  <rect x="30" y="238" width="240" height="28" rx="8" fill="#8E4A63"/>
  <rect x="30" y="254" width="240" height="12" rx="0" fill="#8E4A63"/>
  <text x="150" y="256" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Location Details</text>
  <text x="46" y="284" font-size="9.5" fill="#423F4C">Location Name  ·  Address</text>
  <text x="46" y="299" font-size="9.5" fill="#423F4C">Phone Number  ·  Working Hours  (2-column)</text>
  <text x="46" y="314" font-size="9.5" fill="#423F4C">Website URL</text>
  <text x="46" y="333" font-size="9" fill="#7a7080" font-style="italic">Displayed on customer page</text>

  <!-- Section 3: Loyalty Cards -->
  <rect x="30" y="362" width="240" height="90" rx="8" fill="#ffffff" stroke="#8E4A63" stroke-width="1.5"/>
  <rect x="30" y="362" width="240" height="28" rx="8" fill="#8E4A63"/>
  <rect x="30" y="378" width="240" height="12" rx="0" fill="#8E4A63"/>
  <text x="150" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Loyalty Cards</text>
  <text x="46" y="406" font-size="9.5" fill="#423F4C">Card Color (12 swatches)  ·  Stamp/Card Icon</text>
  <text x="46" y="421" font-size="9.5" fill="#423F4C">Stamps Required  (stamps)  /  Points per currency</text>
  <text x="46" y="436" font-size="9.5" fill="#423F4C">Rewards &amp; Interim Rewards  →  Add Reward dialog</text>

  <!-- ── MIDDLE COLUMN: Action buttons ── -->

  <!-- Connector lines -->
  <line x1="270" y1="137" x2="310" y2="220" stroke="#d8c8d4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="270" y1="292" x2="310" y2="280" stroke="#d8c8d4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="270" y1="407" x2="310" y2="340" stroke="#d8c8d4" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Actions box -->
  <rect x="310" y="200" width="158" height="155" rx="8" fill="#ffffff" stroke="#423F4C" stroke-width="1.5"/>
  <text x="389" y="222" text-anchor="middle" font-size="10.5" font-weight="700" fill="#423F4C">Actions</text>

  <!-- Create Merchant button -->
  <rect x="326" y="232" width="126" height="26" rx="5" fill="#8E4A63"/>
  <text x="389" y="249" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Create Merchant</text>
  <text x="389" y="266" text-anchor="middle" font-size="8.5" fill="#7a7080">(first save → POST)</text>

  <!-- Update Merchant button -->
  <rect x="326" y="276" width="126" height="26" rx="5" fill="#6b3a50"/>
  <text x="389" y="293" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Update Merchant</text>
  <text x="389" y="310" text-anchor="middle" font-size="8.5" fill="#7a7080">(subsequent saves → PUT)</text>

  <!-- Preview button -->
  <rect x="326" y="320" width="58" height="24" rx="5" fill="#F0D793"/>
  <text x="355" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#423F4C">Preview</text>

  <!-- Delete button -->
  <rect x="394" y="320" width="58" height="24" rx="5" fill="#fde8e8"/>
  <text x="423" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#a33232">Delete</text>

  <!-- ── RIGHT COLUMN: Outcomes ── -->

  <!-- Arrow from Create/Update to "Page published" -->
  <line x1="468" y1="265" x2="508" y2="230" stroke="#8E4A63" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow from Preview to "Preview tab" -->
  <line x1="468" y1="332" x2="508" y2="340" stroke="#F0D793" stroke-width="1.5" marker-end="url(#arrow-gold)"/>
  <!-- Arrow from Delete to "Page reset" -->
  <line x1="452" y1="344" x2="508" y2="380" stroke="#c47a7a" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Outcome: page published -->
  <rect x="508" y="192" width="182" height="52" rx="7" fill="#f0e8ec" stroke="#8E4A63" stroke-width="1.2"/>
  <text x="599" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#8E4A63">Page published</text>
  <text x="599" y="228" text-anchor="middle" font-size="9" fill="#423F4C">Live at /m/your-slug</text>
  <text x="599" y="240" text-anchor="middle" font-size="9" fill="#423F4C">Visible in Qtap customer app</text>

  <!-- Outcome: preview -->
  <rect x="508" y="316" width="182" height="40" rx="7" fill="#fffbe6" stroke="#c9a82a" stroke-width="1.2"/>
  <text x="599" y="333" text-anchor="middle" font-size="10" font-weight="700" fill="#8a7010">Preview (new tab)</text>
  <text x="599" y="347" text-anchor="middle" font-size="9" fill="#423F4C">Uses unsaved state</text>

  <!-- Outcome: deleted/reset -->
  <rect x="508" y="362" width="182" height="52" rx="7" fill="#fdf0f0" stroke="#c47a7a" stroke-width="1.2"/>
  <text x="599" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#a33232">Page reset</text>
  <text x="599" y="395" text-anchor="middle" font-size="9" fill="#423F4C">Clears cover, logo, settings</text>
  <text x="599" y="408" text-anchor="middle" font-size="9" fill="#423F4C">Loyalty programs unaffected</text>

  <!-- Live Preview callout box -->
  <rect x="508" y="52" width="182" height="124" rx="8" fill="#ffffff" stroke="#423F4C" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="599" y="72" text-anchor="middle" font-size="10.5" font-weight="700" fill="#423F4C">Live Preview</text>
  <text x="599" y="88" text-anchor="middle" font-size="9" fill="#7a7080">(large screens only)</text>
  <line x1="530" y1="96" x2="670" y2="96" stroke="#e8e4ef" stroke-width="1"/>
  <text x="599" y="110" text-anchor="middle" font-size="9" fill="#423F4C">Updates in real time</text>
  <text x="599" y="124" text-anchor="middle" font-size="9" fill="#423F4C">Shows: page header,</text>
  <text x="599" y="138" text-anchor="middle" font-size="9" fill="#423F4C">loyalty card, location info</text>
  <text x="599" y="155" text-anchor="middle" font-size="9" fill="#7a7080" font-style="italic">Hidden on small screens</text>

  <!-- Access note -->
  <rect x="310" y="60" width="158" height="58" rx="7" fill="#fdf5f8" stroke="#8E4A63" stroke-width="1"/>
  <text x="389" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#8E4A63">Access</text>
  <text x="389" y="93" text-anchor="middle" font-size="9" fill="#423F4C">Owners: always</text>
  <text x="389" y="107" text-anchor="middle" font-size="9" fill="#a33232">Managers &amp; staff: blocked</text>

  <!-- Reward dialog callout -->
  <rect x="30" y="462" width="460" height="14" rx="4" fill="none"/>
  <text x="30" y="473" font-size="8.5" fill="#7a7080">Add Reward dialog: Reward Type (Main / Sign Up / Interim) · Name · Image (2MB) · Staff Notes · Expiry (days)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#8E4A63"/>
    </marker>
    <marker id="arrow-gold" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#c9a82a"/>
    </marker>
    <marker id="arrow-red" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#c47a7a"/>
    </marker>
  </defs>

</svg>
