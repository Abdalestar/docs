<svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="720" height="540" fill="#F8F5F2"/>

  <!-- Card -->
  <rect x="20" y="20" width="680" height="430" rx="16" fill="#FFFFFF" stroke="#8E4A63" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- Progress ring -->
  <g transform="translate(70,78)">
    <circle r="30" fill="none" stroke="#E5E7EB" stroke-width="6"/>
    <!-- ~29% arc (2 of 7), starting at top, clockwise -->
    <path d="M 0 -30 A 30 30 0 0 1 25.6 15.6" fill="none" stroke="#8E4A63" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#423F4C">29%</text>
  </g>

  <!-- Header text -->
  <text x="120" y="64" font-size="18" font-weight="700" fill="#111827">Getting Started</text>
  <text x="120" y="88" font-size="12.5" fill="#6B6770">2 of 7 complete &#183; complete tasks to earn bonus trial days</text>

  <!-- Skip / dismiss -->
  <text x="618" y="62" text-anchor="end" font-size="13" fill="#6B6770">Skip</text>
  <text x="668" y="64" text-anchor="middle" font-size="17" fill="#6B6770">&#215;</text>

  <line x1="36" y1="106" x2="684" y2="106" stroke="#F3F4F6" stroke-width="1.5"/>

  <!-- Row template helpers drawn inline -->
  <!-- Row 1: done -->
  <g transform="translate(0,140)">
    <circle cx="50" cy="0" r="9" fill="#4CAF50"/>
    <path d="M 45.5 0 l 3 3 l 6 -6.5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="4" font-size="13.5" fill="#9CA3AF" text-decoration="line-through">Create your account</text>
  </g>
  <!-- Row 2: done -->
  <g transform="translate(0,184)">
    <circle cx="50" cy="0" r="9" fill="#4CAF50"/>
    <path d="M 45.5 0 l 3 3 l 6 -6.5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="4" font-size="13.5" fill="#9CA3AF" text-decoration="line-through">Set up your business details</text>
  </g>
  <!-- Row 3: todo + reward -->
  <g transform="translate(0,228)">
    <circle cx="50" cy="0" r="9" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="72" y="4" font-size="13.5" fill="#111827">Create your first loyalty card</text>
    <g transform="translate(560,-11)">
      <rect width="64" height="22" rx="11" fill="#FFF6D9" stroke="#E0B873" stroke-width="1"/>
      <text x="16" y="15" font-size="12" fill="#8A6D1B">&#127873;</text>
      <text x="34" y="15.5" font-size="12" font-weight="700" fill="#8A6D1B">+1d</text>
    </g>
    <path d="M 656 -4 l 5 4 l -5 4" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Row 4: todo + reward -->
  <g transform="translate(0,272)">
    <circle cx="50" cy="0" r="9" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="72" y="4" font-size="13.5" fill="#111827">Generate a QR code</text>
    <g transform="translate(560,-11)">
      <rect width="64" height="22" rx="11" fill="#FFF6D9" stroke="#E0B873" stroke-width="1"/>
      <text x="16" y="15" font-size="12" fill="#8A6D1B">&#127873;</text>
      <text x="34" y="15.5" font-size="12" font-weight="700" fill="#8A6D1B">+1d</text>
    </g>
    <path d="M 656 -4 l 5 4 l -5 4" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Row 5: todo + reward -->
  <g transform="translate(0,316)">
    <circle cx="50" cy="0" r="9" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="72" y="4" font-size="13.5" fill="#111827">Invite a team member</text>
    <g transform="translate(560,-11)">
      <rect width="64" height="22" rx="11" fill="#FFF6D9" stroke="#E0B873" stroke-width="1"/>
      <text x="16" y="15" font-size="12" fill="#8A6D1B">&#127873;</text>
      <text x="34" y="15.5" font-size="12" font-weight="700" fill="#8A6D1B">+1d</text>
    </g>
    <path d="M 656 -4 l 5 4 l -5 4" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Row 6: todo, no reward -->
  <g transform="translate(0,360)">
    <circle cx="50" cy="0" r="9" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="72" y="4" font-size="13.5" fill="#111827">Get your first member</text>
    <path d="M 656 -4 l 5 4 l -5 4" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Row 7: todo + reward -->
  <g transform="translate(0,404)">
    <circle cx="50" cy="0" r="9" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="72" y="4" font-size="13.5" fill="#111827">Create a campaign</text>
    <g transform="translate(560,-11)">
      <rect width="64" height="22" rx="11" fill="#FFF6D9" stroke="#E0B873" stroke-width="1"/>
      <text x="16" y="15" font-size="12" fill="#8A6D1B">&#127873;</text>
      <text x="34" y="15.5" font-size="12" font-weight="700" fill="#8A6D1B">+1d</text>
    </g>
    <path d="M 656 -4 l 5 4 l -5 4" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Legend: the three states a reward task moves through -->
  <text x="20" y="486" font-size="12.5" font-weight="700" fill="#423F4C">How a bonus day is earned</text>
  <g transform="translate(20,500)">
    <rect width="64" height="22" rx="11" fill="#FFF6D9" stroke="#E0B873" stroke-width="1"/>
    <text x="16" y="15" font-size="12" fill="#8A6D1B">&#127873;</text>
    <text x="34" y="15.5" font-size="12" font-weight="700" fill="#8A6D1B">+1d</text>
  </g>
  <text x="92" y="515" font-size="12" fill="#6B6770">offered</text>
  <path d="M 150 511 l 12 0 m -4 -4 l 4 4 l -4 4" fill="none" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(176,500)">
    <rect width="96" height="22" rx="6" fill="#FFFFFF" stroke="#4CAF50" stroke-width="1.2"/>
    <text x="48" y="15.5" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">Claim +1d</text>
  </g>
  <text x="282" y="515" font-size="12" fill="#6B6770">tap it</text>
  <path d="M 326 511 l 12 0 m -4 -4 l 4 4 l -4 4" fill="none" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(352,500)">
    <rect width="104" height="22" rx="6" fill="#F3F4F6"/>
    <path d="M 14 0 l 3 3 l 6 -6.5" transform="translate(0,11)" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="58" y="15.5" text-anchor="middle" font-size="12" font-weight="600" fill="#423F4C">+1d earned</text>
  </g>
  <text x="466" y="515" font-size="12" fill="#6B6770">added to trial</text>
</svg>
