<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Merchant profile page layout showing the profile card with business details and live stats">
  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="#F8F5F2"/>

  <!-- Page header -->
  <text x="40" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#423F4C">Merchants</text>
  <text x="40" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6B6770">Manage your merchants.</text>

  <!-- Edit Merchant button -->
  <rect x="620" y="24" width="148" height="36" rx="8" fill="#8E4A63"/>
  <text x="694" y="47" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Edit Merchant</text>

  <!-- Profile card -->
  <rect x="30" y="85" width="740" height="305" rx="12" fill="white" stroke="#E8E4E0" stroke-width="1"/>

  <!-- Logo placeholder -->
  <rect x="55" y="110" width="70" height="70" rx="14" fill="#F8F5F2" stroke="#E8E4E0" stroke-width="1"/>
  <text x="90" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">Logo</text>

  <!-- Business name + badge -->
  <text x="145" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#423F4C">My Coffee Shop</text>
  <rect x="300" y="115" width="52" height="22" rx="4" fill="#8E4A63"/>
  <text x="326" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="white">Active</text>

  <!-- Description -->
  <text x="145" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B6770">Best specialty coffee in Doha since 2019.</text>

  <!-- Detail row: category, location, phone, website, rating -->
  <text x="145" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">Cafe</text>
  <circle cx="180" cy="175" r="1.5" fill="#E8E4E0"/>
  <text x="190" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">The Pearl, Qatar</text>
  <circle cx="285" cy="175" r="1.5" fill="#E8E4E0"/>
  <text x="295" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">+974 5555 1234</text>
  <circle cx="392" cy="175" r="1.5" fill="#E8E4E0"/>
  <text x="402" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">mycoffee.qa</text>
  <circle cx="470" cy="175" r="1.5" fill="#E8E4E0"/>
  <text x="485" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#F0D793">&#9733;</text>
  <text x="498" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">4.8</text>

  <!-- Loyalty cards count -->
  <text x="145" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">2 loyalty cards</text>

  <!-- Divider -->
  <line x1="55" y1="218" x2="745" y2="218" stroke="#F0ECE8" stroke-width="1"/>

  <!-- Stats section label -->
  <text x="55" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#423F4C">Live Stats</text>

  <!-- Stat boxes -->
  <!-- Members -->
  <rect x="55" y="258" width="155" height="64" rx="8" fill="#F8F5F2"/>
  <text x="132" y="283" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#423F4C">46</text>
  <text x="132" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">members</text>

  <!-- Stamps -->
  <rect x="225" y="258" width="155" height="64" rx="8" fill="#F8F5F2"/>
  <text x="302" y="283" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#423F4C">128</text>
  <text x="302" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">stamps earned</text>

  <!-- Points -->
  <rect x="395" y="258" width="155" height="64" rx="8" fill="#F8F5F2"/>
  <text x="472" y="283" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#423F4C">3,450</text>
  <text x="472" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">points earned</text>

  <!-- Redemptions -->
  <rect x="565" y="258" width="155" height="64" rx="8" fill="#F8F5F2"/>
  <text x="642" y="283" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#423F4C">22</text>
  <text x="642" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B6770">redeemed</text>

  <!-- Action buttons row -->
  <text x="55" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#423F4C">Actions</text>

  <rect x="55" y="372" width="80" height="30" rx="6" fill="white" stroke="#E8E4E0" stroke-width="1"/>
  <text x="95" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#423F4C">Preview</text>

  <rect x="145" y="372" width="65" height="30" rx="6" fill="white" stroke="#E8E4E0" stroke-width="1"/>
  <text x="177" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#423F4C">Edit</text>

  <rect x="220" y="372" width="72" height="30" rx="6" fill="#DC2626" stroke="none"/>
  <text x="256" y="391" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">Delete</text>
</svg>
