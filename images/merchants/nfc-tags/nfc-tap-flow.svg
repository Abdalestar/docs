<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="760" height="470" fill="#F8F5F2"/>
  <text x="380" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#423F4C">What happens when a customer taps a tag</text>

  <!-- Step 1 -->
  <rect x="250" y="62" width="260" height="56" rx="12" fill="#8E4A63"/>
  <text x="380" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Customer taps the tag</text>
  <text x="380" y="106" text-anchor="middle" font-size="13" fill="#F0D793">with the Qtap app open</text>

  <line x1="380" y1="118" x2="380" y2="146" stroke="#6B6770" stroke-width="2"/>
  <polygon points="380,150 374,140 386,140" fill="#6B6770"/>

  <!-- Step 2 -->
  <rect x="210" y="150" width="340" height="56" rx="12" fill="#FFFFFF" stroke="#E5D7DC" stroke-width="1.5"/>
  <text x="380" y="174" text-anchor="middle" font-size="14" font-weight="600" fill="#423F4C">Qtap reads the serial number and</text>
  <text x="380" y="193" text-anchor="middle" font-size="14" font-weight="600" fill="#423F4C">identifies the member (a new one is added for you)</text>

  <line x1="380" y1="206" x2="380" y2="234" stroke="#6B6770" stroke-width="2"/>
  <polygon points="380,238 374,228 386,228" fill="#6B6770"/>

  <!-- Decision -->
  <rect x="300" y="238" width="160" height="48" rx="10" fill="#F0D793"/>
  <text x="380" y="267" text-anchor="middle" font-size="14" font-weight="700" fill="#423F4C">Tag active?</text>

  <!-- No branch -->
  <line x1="460" y1="262" x2="600" y2="262" stroke="#6B6770" stroke-width="2"/>
  <polygon points="604,262 594,256 594,268" fill="#6B6770"/>
  <text x="528" y="253" text-anchor="middle" font-size="12" fill="#6B6770">No</text>
  <rect x="604" y="238" width="120" height="48" rx="10" fill="#FFFFFF" stroke="#C9BEC3" stroke-width="1.5"/>
  <text x="664" y="267" text-anchor="middle" font-size="13" font-weight="600" fill="#6B6770">Tap declined</text>

  <!-- Yes -->
  <line x1="380" y1="286" x2="380" y2="312" stroke="#6B6770" stroke-width="2"/>
  <polygon points="380,316 374,306 386,306" fill="#6B6770"/>
  <text x="394" y="304" text-anchor="middle" font-size="12" fill="#6B6770">Yes</text>

  <!-- Three actions -->
  <rect x="40" y="316" width="210" height="96" rx="12" fill="#FFFFFF" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="145" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#8E4A63">Add Stamp</text>
  <text x="145" y="366" text-anchor="middle" font-size="12.5" fill="#423F4C">Adds 1 stamp to the</text>
  <text x="145" y="383" text-anchor="middle" font-size="12.5" fill="#423F4C">linked card. Wait time</text>
  <text x="145" y="400" text-anchor="middle" font-size="12.5" fill="#423F4C">and daily cap still apply.</text>

  <rect x="275" y="316" width="210" height="96" rx="12" fill="#FFFFFF" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="380" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#8E4A63">Award Points</text>
  <text x="380" y="366" text-anchor="middle" font-size="12.5" fill="#423F4C">Adds the flat points</text>
  <text x="380" y="383" text-anchor="middle" font-size="12.5" fill="#423F4C">value set on the tag.</text>
  <text x="380" y="400" text-anchor="middle" font-size="12.5" fill="#6B6770">No multiplier bonus.</text>

  <rect x="510" y="316" width="210" height="96" rx="12" fill="#FFFFFF" stroke="#8E4A63" stroke-width="1.5"/>
  <text x="615" y="343" text-anchor="middle" font-size="15" font-weight="700" fill="#8E4A63">Check-In</text>
  <text x="615" y="366" text-anchor="middle" font-size="12.5" fill="#423F4C">Records the visit.</text>
  <text x="615" y="383" text-anchor="middle" font-size="12.5" fill="#423F4C">No stamp or points</text>
  <text x="615" y="400" text-anchor="middle" font-size="12.5" fill="#423F4C">added.</text>

  <line x1="380" y1="312" x2="145" y2="312" stroke="#6B6770" stroke-width="2"/>
  <line x1="380" y1="312" x2="615" y2="312" stroke="#6B6770" stroke-width="2"/>
  <line x1="145" y1="312" x2="145" y2="316" stroke="#6B6770" stroke-width="2"/>
  <line x1="615" y1="312" x2="615" y2="316" stroke="#6B6770" stroke-width="2"/>

  <text x="380" y="442" text-anchor="middle" font-size="12.5" fill="#6B6770">A tap does not send the "reward earned" push that a QR scan sends.</text>
</svg>
