<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="880" height="470" fill="#F8F5F2"/>

  <!-- Decision question -->
  <text x="440" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#423F4C">Which one should you send?</text>

  <!-- Push card -->
  <rect x="40" y="70" width="370" height="350" rx="16" fill="#FFFFFF" stroke="#E5DCE0" stroke-width="1.5"/>
  <rect x="40" y="70" width="370" height="56" rx="16" fill="#8E4A63"/>
  <rect x="40" y="110" width="370" height="16" fill="#8E4A63"/>
  <text x="64" y="104" font-size="19" font-weight="700" fill="#FFFFFF">Push notification</text>

  <text x="64" y="160" font-size="13" font-weight="700" fill="#8E4A63">YOU decide when it goes out</text>

  <text x="64" y="196" font-size="14" fill="#423F4C">Trigger: you click Send</text>
  <text x="64" y="232" font-size="14" fill="#423F4C">Timing: now, or scheduled once</text>
  <text x="64" y="268" font-size="14" fill="#423F4C">Repeats: no guard. Send it</text>
  <text x="64" y="288" font-size="14" fill="#423F4C">again and members get it again</text>
  <text x="64" y="324" font-size="14" fill="#423F4C">Best for: a one-time message,</text>
  <text x="64" y="344" font-size="14" fill="#423F4C">like a same-day offer</text>

  <rect x="64" y="372" width="322" height="30" rx="8" fill="#F0D793"/>
  <text x="225" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Found on the Notifications page</text>

  <!-- Campaign card -->
  <rect x="470" y="70" width="370" height="350" rx="16" fill="#FFFFFF" stroke="#E5DCE0" stroke-width="1.5"/>
  <rect x="470" y="70" width="370" height="56" rx="16" fill="#423F4C"/>
  <rect x="470" y="110" width="370" height="16" fill="#423F4C"/>
  <text x="494" y="104" font-size="19" font-weight="700" fill="#FFFFFF">Campaign</text>

  <text x="494" y="160" font-size="13" font-weight="700" fill="#423F4C">QTAP decides, by a rule you set</text>

  <text x="494" y="196" font-size="14" fill="#423F4C">Trigger: a member matches</text>
  <text x="494" y="216" font-size="14" fill="#423F4C">a condition</text>
  <text x="494" y="252" font-size="14" fill="#423F4C">Timing: checked every ~15 min</text>
  <text x="494" y="272" font-size="14" fill="#423F4C">while the campaign is active</text>
  <text x="494" y="308" font-size="14" fill="#423F4C">Repeats: once per member,</text>
  <text x="494" y="328" font-size="14" fill="#423F4C">deduped automatically</text>
  <text x="494" y="364" font-size="14" fill="#423F4C">Best for: ongoing outreach</text>

  <rect x="494" y="384" width="322" height="30" rx="8" fill="#F0D793"/>
  <text x="655" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#423F4C">Found on the Campaigns page</text>

  <!-- center divider -->
  <text x="440" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#6B6770">vs</text>
</svg>
