<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="760" height="470" fill="#F8F5F2"/>
  <text x="380" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#423F4C">One code, two ways to scan</text>
  <text x="380" y="70" text-anchor="middle" font-size="14" fill="#6B6770">Only the app credits the customer. A plain camera scan just records the visit.</text>

  <!-- The code at the top -->
  <g>
    <rect x="320" y="96" width="120" height="120" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <g fill="#423F4C">
      <rect x="340" y="116" width="26" height="26"/><rect x="394" y="116" width="26" height="26"/>
      <rect x="340" y="170" width="26" height="26"/><rect x="372" y="148" width="16" height="16"/>
      <rect x="398" y="172" width="22" height="22"/><rect x="372" y="178" width="14" height="14"/>
    </g>
    <text x="380" y="236" text-anchor="middle" font-size="13" fill="#6B6770">Your code at the counter or table</text>
  </g>

  <!-- branch lines -->
  <path d="M380 248 L380 268 M380 268 L190 268 L190 292 M380 268 L570 268 L570 292" fill="none" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="190,300 184,290 196,290" fill="#9CA3AF"/>
  <polygon points="570,300 564,290 576,290" fill="#9CA3AF"/>

  <!-- Left path: the app -->
  <g>
    <rect x="40" y="300" width="300" height="138" rx="16" fill="#FFFFFF" stroke="#8E4A63" stroke-width="2.5"/>
    <text x="60" y="332" font-size="16" font-weight="700" fill="#8E4A63">Scans in the Qtap app</text>
    <text x="60" y="360" font-size="13.5" fill="#423F4C">The app knows which member is scanning,</text>
    <text x="60" y="380" font-size="13.5" fill="#423F4C">so it sends their account with the scan.</text>
    <rect x="60" y="396" width="260" height="28" rx="8" fill="#F5E6EC"/>
    <text x="72" y="415" font-size="13.5" font-weight="600" fill="#8E4A63">Stamp or points land on their card</text>
  </g>

  <!-- Right path: camera -->
  <g>
    <rect x="420" y="300" width="300" height="138" rx="16" fill="#FFFFFF" stroke="#423F4C" stroke-width="2.5"/>
    <text x="440" y="332" font-size="16" font-weight="700" fill="#423F4C">Scans with the phone camera</text>
    <text x="440" y="360" font-size="13.5" fill="#423F4C">The camera opens your Qtap scan page</text>
    <text x="440" y="380" font-size="13.5" fill="#423F4C">in a browser, with no account attached.</text>
    <rect x="440" y="396" width="260" height="28" rx="8" fill="#EFEDEA"/>
    <text x="452" y="415" font-size="13.5" font-weight="600" fill="#6B6770">The visit is recorded, nothing is earned</text>
  </g>
</svg>
